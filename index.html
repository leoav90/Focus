        '<button class="btn-sm" data-action="cancel-delete-project">Cancelar</button></div>';
    } else {
      html += '<button class="icon-btn" data-action="open-delete-project" aria-label="Eliminar proyecto">' + iconTrash(14) + '</button>';
    }
    html += '</div>';

    html += '<div class="progress-row">' +
      '<div class="progress-track"><div class="progress-fill" style="width:' + pct + '%;background:' + active.color + '"></div></div>' +
      '<span class="progress-label">' + doneCount + '/' + total + ' completadas</span>' +
      '</div>';

    LANES.forEach(function (lane) {
      var tasks = visibleActiveTasks.filter(function (t) { return t.lane === lane.key; }).sort(function (a, b) {
        return (typeof a.position === "number" ? a.position : 0) - (typeof b.position === "number" ? b.position : 0);
      });
      var collapsed = !!state.collapsedLanes[lane.key];
      var pending = tasks.filter(function (t) { return !isTaskCompleted(t); }).length;
      var statusText = pending > 0 ? (pending + ' pendiente' + (pending > 1 ? 's' : '')) : (tasks.length > 0 ? 'completas' : 'vac\u00edo');

      html += '<div class="lane" data-lane="' + lane.key + '">' +
        '<button class="lane-header" data-action="toggle-lane" data-lane="' + lane.key + '">' +
        '<span class="chev">' + (collapsed ? iconChevronRight(14) : iconChevronDown(14)) + '</span>' +
        '<span class="lane-icon">' + lane.icon(15, lane.accent) + '</span>' +
        '<span class="lane-name">' + lane.label + '</span>' +
        '<span class="lane-status">' + statusText + '</span>' +
        '</button>';

      if (!collapsed) {
        html += '<div class="lane-body">';
        if (tasks.length === 0) {
          html += '<p class="lane-empty">Sin tareas todav\u00eda.</p>';
        }
        html += '<div class="task-list">';
        tasks.forEach(function (task) {
          var taskDone = isTaskCompleted(task);
          html += '<div class="task-row ' + taskVisualClasses(task) + '" draggable="true" data-task-id="' + task.id + '">' +
            '<span class="grip">' + iconGrip(13) + '</span>' +
            '<button class="checkbox" data-action="toggle-task" data-id="' + task.id + '" style="border-color:' + (taskDone ? active.color : '') + ';background:' + (taskDone ? active.color : 'transparent') + '" aria-label="' + (taskDone ? 'Marcar como pendiente' : 'Marcar como completada') + '">' +
            (taskDone ? iconCheck(11, "white") : '') +
            '</button>';

          if (state.editingTask === task.id) {
            html += '<input type="text" class="task-edit-input" id="taskEditInput" value="' + escapeHtml(task.text) + '" data-id="' + task.id + '">';
          } else {
            html += '<div class="task-content">' +
              '<span class="task-text' + (taskDone ? ' done' : '') + '" data-action="edit-task" data-id="' + task.id + '">' + escapeHtml(task.text) + '</span>' +
              taskMetaHtml(task) +
              taskNoteHtml(task, active.id) +
              subtasksHtml(task) +
              '</div>';
          }

          html += '<button class="task-action-btn" data-action="open-task-detail" data-id="' + task.id + '" aria-label="Editar detalle" title="Editar detalle">' + iconInfo(13) + '</button>' +
            '<button class="task-action-btn" data-action="edit-task" data-id="' + task.id + '" aria-label="Editar tarea">' + iconPencil(12) + '</button>' +
            '<button class="task-action-btn" data-action="delete-task" data-id="' + task.id + '" aria-label="Eliminar tarea">' + iconX(13) + '</button>' +
            '</div>';
        });
        html += '</div>';

        html += '<div class="add-task-row">' +
          '<input type="text" placeholder="Agregar tarea..." data-lane="' + lane.key + '" autocomplete="off">' +
          '<button data-action="add-task" data-lane="' + lane.key + '" aria-label="Agregar tarea">' + iconPlus(14) + '</button>' +
          '<button data-action="open-create-task-detail" data-lane="' + lane.key + '" aria-label="Crear tarea detallada" title="Crear tarea detallada">' + iconInfo(14) + '</button>' +
          '</div>';

        html += '</div>';
      }
      html += '</div>';
    });

    main.innerHTML = html;

    if (state.editingProjectName) {
      var nameInput = document.getElementById("projectNameInput");
      if (nameInput) {
        nameInput.focus();
        nameInput.select();
        nameInput.addEventListener("blur", function () { renameProject(active.id, nameInput.value); });
        nameInput.addEventListener("keydown", function (e) {
          if (e.key === "Enter") nameInput.blur();
          if (e.key === "Escape") { state.editingProjectName = false; render(); }
        });
      }
    }

    if (state.editingTask) {
      var taskInput = document.getElementById("taskEditInput");
      if (taskInput) {
        taskInput.focus();
        taskInput.select();
        taskInput.addEventListener("blur", function () { saveTaskEdit(taskInput.dataset.id, taskInput.value); });
        taskInput.addEventListener("keydown", function (e) {
          if (e.key === "Enter") taskInput.blur();
          if (e.key === "Escape") { state.editingTask = null; render(); }
        });
      }
    }

    // add-task inputs (Enter key)
    main.querySelectorAll('.add-task-row input').forEach(function (input) {
      input.addEventListener("keydown", function (e) {
        if (e.key === "Enter") addTask(input.dataset.lane, input.value);
      });
    });

    main.querySelectorAll('.subtask-add-input').forEach(function (input) {
      input.addEventListener("keydown", function (e) {
        if (e.key === "Enter") addSubtask(input.dataset.taskId, input.value, input.dataset.projectId);
      });
    });

    // drag and drop
    main.querySelectorAll('.task-row').forEach(function (row) {
      row.addEventListener("dragstart", function (e) {
        e.dataTransfer.setData("text/plain", row.dataset.taskId);
        row.classList.add("dragging");
      });
      row.addEventListener("dragend", function () { row.classList.remove("dragging"); });
    });
    main.querySelectorAll('.lane').forEach(function (laneEl) {
      laneEl.addEventListener("dragover", function (e) { e.preventDefault(); });
      laneEl.addEventListener("drop", function (e) {
        e.preventDefault();
        var taskId = e.dataTransfer.getData("text/plain");
        if (taskId) moveTask(taskId, laneEl.dataset.lane);
      });
    });
  }

  // ---------- event delegation ----------
  document.addEventListener("click", function (e) {
    if (e.target.closest("[data-modal-panel]") && !e.target.closest("[data-modal-panel] [data-action]")) return;
    var el = e.target.closest("[data-action]");
    if (!el) {
      if (state.settingsOpen && !e.target.closest("#headerTools")) {
        state.settingsOpen = false;
        renderHeader();
      }
      return;
    }
    var action = el.dataset.action;

    switch (action) {
      case "toggle-settings":
        state.settingsOpen = !state.settingsOpen;
        renderHeader();
        break;
      case "export-backup":
        exportBackupJson();
        break;
      case "open-import":
        state.settingsOpen = false;
        renderHeader();
        var fileInput = document.getElementById("backupFileInput");
        if (fileInput) {
          fileInput.value = "";
          fileInput.click();
        }
        break;
      case "create-local-backup":
        try {
          createLocalBackup("manual");
          state.settingsOpen = false;
          showSaveStatus("Respaldo local creado");
          renderHeader();
        } catch (e) {
          openMessageModal("No se pudo crear el respaldo", "localStorage no permitio guardar una copia local.", e.message);
        }
        break;
      case "restore-local-backup":
        restoreLatestLocalBackup();
        break;
      case "storage-info":
        openStorageInfo();
        break;
      case "close-modal":
        state.modal = null;
        state.pendingImport = null;
        state.taskForm = null;
        render();
        break;
      case "confirm-import-replace":
        applyPendingImport("replace");
        break;
      case "confirm-import-merge":
        applyPendingImport("merge");
        break;
      case "confirm-restore-local":
        applyPendingRestore();
        break;
      case "select-today":
        state.searchQuery = "";
        state.view = "today";
        state.confirmDeleteProject = false;
        state.editingProjectName = false;
        state.editingTask = null;
        if (!state.todayDate) state.todayDate = dateToInputValue(new Date());
        render();
        break;
      case "select-project":
        state.searchQuery = "";
        state.view = "project";
        state.activeProjectId = el.dataset.id;
        state.confirmDeleteProject = false;
        state.editingProjectName = false;
        state.editingTask = null;
        render();
        break;
      case "open-source-project":
        state.searchQuery = "";
        state.view = "project";
        state.activeProjectId = el.dataset.projectId;
        state.confirmDeleteProject = false;
        state.editingProjectName = false;
        state.editingTask = null;
        render();
        break;
      case "toggle-today-section":
        state.collapsedTodaySections[el.dataset.section] = !state.collapsedTodaySections[el.dataset.section];
        render();
        break;
      case "go-real-today":
        state.todayDate = dateToInputValue(new Date());
        render();
        break;
      case "clear-search":
        state.searchQuery = "";
        render();
        break;
      case "open-new-project":
        state.newProjectOpen = true;
        render();
        break;
      case "cancel-new-project":
        state.newProjectOpen = false;
        render();
        break;
      case "confirm-new-project":
        var ni = document.getElementById("newProjectInput");
        addProject(ni ? ni.value : "");
        break;
      case "edit-project-name":
        state.editingProjectName = true;
        render();
        break;
      case "open-delete-project":
        state.confirmDeleteProject = true;
        render();
        break;
      case "cancel-delete-project":
        state.confirmDeleteProject = false;
        render();
        break;
      case "confirm-delete-project":
        var active = getActiveProject();
        if (active) deleteProject(active.id);
        break;
      case "toggle-lane":
        var laneKey = el.dataset.lane;
        state.collapsedLanes[laneKey] = !state.collapsedLanes[laneKey];
        render();
        break;
      case "toggle-task":
        toggleTask(el.dataset.id, el.dataset.projectId);
        break;
      case "toggle-subtask":
        toggleSubtask(el.dataset.id, el.dataset.subtaskId, el.dataset.projectId);
        break;
      case "toggle-task-note":
        state.expandedNotes[el.dataset.noteKey] = !state.expandedNotes[el.dataset.noteKey];
        render();
        break;
      case "delete-subtask":
        deleteSubtask(el.dataset.id, el.dataset.subtaskId, el.dataset.projectId);
        break;
      case "add-subtask":
        var subtaskInput = el.parentElement ? el.parentElement.querySelector(".subtask-add-input") : null;
        addSubtask(el.dataset.id, subtaskInput ? subtaskInput.value : "", el.dataset.projectId);
        break;
      case "open-task-detail":
        openTaskForm(el.dataset.id, el.dataset.projectId);
        break;
      case "open-create-task-detail":
        openCreateTaskForm(el.dataset.lane);
        break;
      case "save-task-form":
        saveTaskForm();
        break;
      case "edit-task":
        state.editingTask = el.dataset.id;
        render();
        break;
      case "delete-task":
        deleteTask(el.dataset.id);
        break;
      case "add-task":
        var taskInput = document.querySelector('.add-task-row input[data-lane="' + el.dataset.lane + '"]');
        addTask(el.dataset.lane, taskInput ? taskInput.value : "");
        break;
    }
  });

  document.addEventListener("change", function (e) {
    var el = e.target.closest("[data-action]");
    if (!el) return;
    if (el.dataset.action === "move-task-lane") {
      moveTask(el.dataset.id, el.value, el.dataset.projectId);
    }
  });

  document.addEventListener("input", function (e) {
    if (e.target && e.target.id === "globalSearchInput") {
      state.searchQuery = e.target.value;
      renderMain();
    }
  });

  document.addEventListener("keydown", function (e) {
    if (e.key === "Escape" && state.modal) {
      state.modal = null;
      state.pendingImport = null;
      state.taskForm = null;
      render();
    }
  });

  var backupFileInput = document.getElementById("backupFileInput");
  if (backupFileInput) {
    backupFileInput.addEventListener("change", function () {
      prepareImportFromFile(backupFileInput.files && backupFileInput.files[0]);
    });
  }

  // ---------- init ----------
  load();
  render();
})();
</script>
</body>
</html>
