<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mis Proyectos</title>
<style>
  :root {
    --bg: #faf9f7;
    --surface: #ffffff;
    --surface-2: #f1efe9;
    --border: #e3e0d8;
    --border-strong: #cfcabe;
    --text: #232220;
    --text-2: #6b675f;
    --text-3: #9a958a;
    --danger: #b5472b;
    --danger-bg: #fbece6;
    --radius-md: 8px;
    --radius-lg: 12px;
    --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    -webkit-font-smoothing: antialiased;
  }
  body {
    min-height: 100vh;
    padding: 24px;
  }
  #app {
    max-width: 1000px;
    margin: 0 auto;
  }
  .header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 20px;
  }
  .header h1 {
    font-size: 20px;
    font-weight: 600;
    margin: 0;
  }
  .header .sub {
    font-size: 13px;
    color: var(--text-3);
  }
  .layout {
    display: flex;
    gap: 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
    min-height: 520px;
  }
  .sidebar {
    width: 220px;
    flex-shrink: 0;
    border-right: 1px solid var(--border);
    padding: 16px 10px;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .sidebar-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-3);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    padding: 4px 10px 10px;
  }
  .project-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 9px 10px;
    border-radius: var(--radius-md);
    border: none;
    background: transparent;
    cursor: pointer;
    text-align: left;
    width: 100%;
    font-size: 14px;
    font-family: var(--font);
    color: var(--text);
  }
  .project-item:hover { background: var(--surface-2); }
  .project-item.active { background: var(--surface-2); font-weight: 500; }
  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .project-item .name {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .project-item .count {
    font-size: 11px;
    color: var(--text-3);
    flex-shrink: 0;
  }
  .new-project-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 9px 10px;
    border-radius: var(--radius-md);
    border: none;
    background: transparent;
    cursor: pointer;
    font-size: 13px;
    color: var(--text-2);
    margin-top: 4px;
    font-family: var(--font);
  }
  .new-project-btn:hover { background: var(--surface-2); }
  .new-project-form {
    display: flex;
    flex-direction: column;
    gap: 6px;
    padding: 4px 10px;
  }
  .main {
    flex: 1;
    padding: 20px 28px;
    min-width: 0;
  }
  .empty-state {
    text-align: center;
    padding: 4rem 0;
    color: var(--text-2);
    font-size: 14px;
  }
  .project-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 6px;
    gap: 12px;
  }
  .project-header-left {
    display: flex;
    align-items: center;
    gap: 8px;
    flex: 1;
    min-width: 0;
  }
  .project-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .project-title {
    margin: 0;
    font-size: 19px;
    font-weight: 600;
    cursor: pointer;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .project-title-input {
    font-size: 19px;
    font-weight: 600;
    padding: 2px 6px;
    border: 1px solid var(--border-strong);
    border-radius: var(--radius-md);
    font-family: var(--font);
    background: var(--surface);
    color: var(--text);
  }
  .icon-btn {
    border: none;
    background: transparent;
    cursor: pointer;
    padding: 6px;
    border-radius: var(--radius-md);
    color: var(--text-3);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .icon-btn:hover { background: var(--surface-2); color: var(--text); }
  .confirm-delete {
    display: flex;
    gap: 6px;
    align-items: center;
    font-size: 12px;
    white-space: nowrap;
  }
  .confirm-delete span { color: var(--text-2); }
  .btn-sm {
    font-size: 12px;
    padding: 4px 10px;
    border-radius: var(--radius-md);
    border: 1px solid var(--border-strong);
    background: var(--surface);
    cursor: pointer;
    font-family: var(--font);
    color: var(--text);
  }
  .btn-sm:hover { background: var(--surface-2); }
  .btn-sm.danger { color: var(--danger); border-color: var(--danger); }
  .btn-sm.danger:hover { background: var(--danger-bg); }
  .progress-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 8px 0 22px;
  }
  .progress-track {
    flex: 1;
    height: 6px;
    border-radius: 4px;
    background: var(--surface-2);
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    transition: width 0.3s ease;
    border-radius: 4px;
  }
  .progress-label {
    font-size: 12px;
    color: var(--text-2);
    white-space: nowrap;
  }
  .lane {
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
    margin-bottom: 10px;
  }
  .lane-header {
    width: 100%;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 11px 14px;
    border: none;
    background: var(--surface-2);
    cursor: pointer;
    text-align: left;
    font-family: var(--font);
  }
  .lane-header .chev {
    color: var(--text-2);
    width: 14px;
    flex-shrink: 0;
  }
  .lane-header .lane-icon {
    flex-shrink: 0;
  }
  .lane-header .lane-name {
    font-size: 14px;
    font-weight: 600;
    flex: 1;
    color: var(--text);
  }
  .lane-header .lane-status {
    font-size: 12px;
    color: var(--text-3);
  }
  .lane-body {
    padding: 10px 14px 12px;
  }
  .lane-empty {
    font-size: 13px;
    color: var(--text-3);
    margin: 4px 0 10px;
  }
  .task-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 4px;
    border-radius: var(--radius-md);
    cursor: grab;
  }
  .task-row:hover { background: var(--surface-2); }
  .task-row.dragging { opacity: 0.4; }
  .grip {
    color: var(--text-3);
    flex-shrink: 0;
    cursor: grab;
  }
  .checkbox {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    border: 1.5px solid var(--border-strong);
    background: transparent;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    padding: 0;
    cursor: pointer;
  }
  .task-text {
    font-size: 14px;
    flex: 1;
    cursor: text;
    overflow-wrap: anywhere;
    color: var(--text);
  }
  .task-text.done {
    color: var(--text-3);
    text-decoration: line-through;
  }
  .task-edit-input {
    font-size: 14px;
    flex: 1;
    padding: 3px 6px;
    border: 1px solid var(--border-strong);
    border-radius: var(--radius-md);
    font-family: var(--font);
    background: var(--surface);
    color: var(--text);
  }
  .task-action-btn {
    padding: 4px;
    flex-shrink: 0;
    border: none;
    background: transparent;
    color: var(--text-3);
    cursor: pointer;
    border-radius: 6px;
    display: flex;
    align-items: center;
  }
  .task-action-btn:hover { background: var(--border); color: var(--text); }
  .add-task-row {
    display: flex;
    gap: 6px;
    margin-top: 8px;
  }
  .add-task-row input {
    flex: 1;
    font-size: 13px;
    padding: 7px 10px;
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    font-family: var(--font);
    background: var(--surface);
    color: var(--text);
  }
  .add-task-row input:focus, .new-project-form input:focus, .task-edit-input:focus, .project-title-input:focus {
    outline: none;
    border-color: var(--border-strong);
    box-shadow: 0 0 0 2px rgba(0,0,0,0.04);
  }
  .add-task-row button {
    padding: 7px 11px;
    border-radius: var(--radius-md);
    border: 1px solid var(--border-strong);
    background: var(--surface);
    cursor: pointer;
    display: flex;
    align-items: center;
  }
  .add-task-row button:hover { background: var(--surface-2); }
  .new-project-form input {
    font-size: 13px;
    padding: 7px 10px;
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    font-family: var(--font);
    background: var(--surface);
    color: var(--text);
    width: 100%;
  }
  .new-project-form .row { display: flex; gap: 6px; }
  .new-project-form .row button { flex: 1; }
  .toast {
    font-size: 12px;
    color: var(--danger);
    margin-bottom: 14px;
    padding: 8px 12px;
    background: var(--danger-bg);
    border-radius: var(--radius-md);
  }
  @media (max-width: 640px) {
    body { padding: 12px; }
    .layout { flex-direction: column; }
    .sidebar { width: 100%; border-right: none; border-bottom: 1px solid var(--border); flex-direction: row; overflow-x: auto; }
    .sidebar-label { display: none; }
    .main { padding: 16px; }
  }
  svg { display: block; }
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <h1>Mis proyectos</h1>
    <span class="sub" id="saveStatus">Guardado</span>
  </div>
  <div class="layout">
    <div class="sidebar" id="sidebar"></div>
    <div class="main" id="main"></div>
  </div>
</div>

<script>
(function () {
  "use strict";

  var SCHEMA_VERSION = 1;
  var STORAGE_KEY = "projects-data-v1";
  var CORRUPT_BACKUP_PREFIX = "projects-data-corrupt-backup-";
  var SAVE_DELAY_MS = 300;
  var VALIDATION_LIMITS = {
    projectNameMin: 1,
    projectNameMax: 80,
    taskTextMin: 1,
    taskTextMax: 300
  };
  var LANE_NAMES = {
    urgente: "Urgente",
    diaria: "Diaria",
    semana: "Esta semana",
    algun_dia: "Alg\u00fan d\u00eda"
  };

  var LANES = [
    { key: "urgente", label: LANE_NAMES.urgente, accent: "#B5472B", icon: iconTriangle },
    { key: "diaria", label: LANE_NAMES.diaria, accent: "#9A7B1E", icon: iconSun },
    { key: "semana", label: LANE_NAMES.semana, accent: "#3C6E52", icon: iconCalendar },
    { key: "algun_dia", label: LANE_NAMES.algun_dia, accent: "#5B6470", icon: iconCloud }
  ];

  var PROJECT_COLORS = ["#B5472B", "#9A7B1E", "#3C6E52", "#3A5A8C", "#6B4C8A", "#5B6470"];

  // ---------- icons (inline SVG, no external deps) ----------
  function svgWrap(inner, size, color) {
    return '<svg width="' + size + '" height="' + size + '" viewBox="0 0 24 24" fill="none" stroke="' + (color || "currentColor") + '" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' + inner + '</svg>';
  }
  function iconTriangle(size, color) {
    return svgWrap('<path d="M12 9v4"/><path d="M10.36 3.7a2 2 0 0 1 3.28 0l8.46 13.5a2 2 0 0 1-1.7 3.05H3.6a2 2 0 0 1-1.7-3.05Z"/><path d="M12 16h.01"/>', size, color);
  }
  function iconSun(size, color) {
    return svgWrap('<circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/>', size, color);
  }
  function iconCalendar(size, color) {
    return svgWrap('<rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4"/><path d="M8 2v4"/><path d="M3 10h18"/>', size, color);
  }
  function iconCloud(size, color) {
    return svgWrap('<path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9Z"/>', size, color);
  }
  function iconPlus(size, color) {
    return svgWrap('<path d="M5 12h14"/><path d="M12 5v14"/>', size, color);
  }
  function iconX(size, color) {
    return svgWrap('<path d="M18 6 6 18"/><path d="m6 6 12 12"/>', size, color);
  }
  function iconCheck(size, color) {
    return svgWrap('<path d="M20 6 9 17l-5-5"/>', size, color);
  }
  function iconTrash(size, color) {
    return svgWrap('<path d="M3 6h18"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><path d="M10 11v6"/><path d="M14 11v6"/>', size, color);
  }
  function iconPencil(size, color) {
    return svgWrap('<path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/>', size, color);
  }
  function iconChevronDown(size, color) {
    return svgWrap('<path d="m6 9 6 6 6-6"/>', size, color);
  }
  function iconChevronRight(size, color) {
    return svgWrap('<path d="m9 18 6-6-6-6"/>', size, color);
  }
  function iconGrip(size, color) {
    return svgWrap('<circle cx="9" cy="5" r="1"/><circle cx="9" cy="12" r="1"/><circle cx="9" cy="19" r="1"/><circle cx="15" cy="5" r="1"/><circle cx="15" cy="12" r="1"/><circle cx="15" cy="19" r="1"/>', size, color);
  }

  // ---------- state ----------
  var state = {
    projects: [],
    activeProjectId: null,
    collapsedLanes: {},
    editingTask: null,
    editingProjectName: false,
    confirmDeleteProject: false,
    newProjectOpen: false,
    storageWarning: null
  };

  function generateId() {
    return Math.random().toString(36).slice(2, 10) + Date.now().toString(36);
  }

  function deepClone(value) {
    return JSON.parse(JSON.stringify(value));
  }

  function sanitizeText(value, maxLength) {
    var text = String(value || "").trim();
    if (typeof maxLength === "number" && maxLength > 0) {
      text = text.slice(0, maxLength);
    }
    return text;
  }

  function showSaveStatus(message) {
    var statusEl = document.getElementById("saveStatus");
    if (statusEl) statusEl.textContent = message;
  }

  function emptyProject(name, color) {
    return { id: generateId(), name: name, color: color, createdAt: Date.now(), tasks: [] };
  }

  function escapeHtml(str) {
    var div = document.createElement("div");
    div.textContent = str;
    return div.innerHTML;
  }

  // ---------- persistence ----------
  var saveTimer = null;

  function getStorageData() {
    var raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return { data: null, corrupt: false };

    try {
      return { data: JSON.parse(raw), corrupt: false };
    } catch (e) {
      var backupKey = CORRUPT_BACKUP_PREFIX + Date.now();
      try {
        localStorage.setItem(backupKey, raw);
      } catch (backupError) {
        console.error("No se pudo guardar backup de datos corruptos:", backupError);
      }
      console.error("JSON inv\u00e1lido en localStorage:", e);
      return { data: null, corrupt: true, backupKey: backupKey };
    }
  }

  function setStorageData(data) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  }

  function getInitialProject() {
    return emptyProject("Mi primer proyecto", PROJECT_COLORS[0]);
  }

  function showStorageWarning(message) {
    state.storageWarning = message;
    renderStorageWarning();
  }

  function renderStorageWarning() {
    var app = document.getElementById("app");
    var existing = document.getElementById("storageWarning");
    if (existing) existing.remove();
    if (!app || !state.storageWarning) return;

    var warning = document.createElement("div");
    warning.className = "toast";
    warning.id = "storageWarning";
    warning.textContent = state.storageWarning;
    app.insertBefore(warning, app.querySelector(".layout"));
  }

  function load() {
    var storage = getStorageData();
    if (storage.data) {
      state.projects = Array.isArray(storage.data.projects) ? storage.data.projects : [];
      state.activeProjectId = storage.data.activeProjectId || (state.projects[0] ? state.projects[0].id : null);
      if (state.projects.length === 0) {
        var p = getInitialProject();
        state.projects = [p];
        state.activeProjectId = p.id;
      }
      return;
    }

    var starter = getInitialProject();
    state.projects = [starter];
    state.activeProjectId = starter.id;

    if (storage.corrupt) {
      state.storageWarning = "No se pudieron leer los datos guardados. Se cre\u00f3 una copia de seguridad y se inici\u00f3 una versi\u00f3n segura.";
      showSaveStatus("Datos seguros sin guardar");
    }
  }

  function save() {
    showSaveStatus("Guardando...");
    if (saveTimer) clearTimeout(saveTimer);
    saveTimer = setTimeout(function () {
      try {
        setStorageData({
          schemaVersion: SCHEMA_VERSION,
          projects: state.projects,
          activeProjectId: state.activeProjectId
        });
        showSaveStatus("Guardado");
      } catch (e) {
        showSaveStatus("Error al guardar");
        console.error("Error guardando:", e);
      }
    }, SAVE_DELAY_MS);
  }

  function getActiveProject() {
    var found = null;
    for (var i = 0; i < state.projects.length; i++) {
      if (state.projects[i].id === state.activeProjectId) { found = state.projects[i]; break; }
    }
    return found || state.projects[0] || null;
  }

  function updateProject(id, fn) {
    for (var i = 0; i < state.projects.length; i++) {
      if (state.projects[i].id === id) {
        state.projects[i] = fn(deepClone(state.projects[i]));
        break;
      }
    }
    save();
    render();
  }

  // ---------- actions ----------
  function addProject(name) {
    var trimmed = sanitizeText(name, VALIDATION_LIMITS.projectNameMax);
    if (trimmed.length < VALIDATION_LIMITS.projectNameMin) return;
    var color = PROJECT_COLORS[state.projects.length % PROJECT_COLORS.length];
    var p = emptyProject(trimmed, color);
    state.projects.push(p);
    state.activeProjectId = p.id;
    state.newProjectOpen = false;
    save();
    render();
  }

  function deleteProject(id) {
    state.projects = state.projects.filter(function (p) { return p.id !== id; });
    if (state.activeProjectId === id) {
      state.activeProjectId = state.projects[0] ? state.projects[0].id : null;
    }
    state.confirmDeleteProject = false;
    save();
    render();
  }

  function addTask(lane, text) {
    var trimmed = sanitizeText(text, VALIDATION_LIMITS.taskTextMax);
    var active = getActiveProject();
    if (trimmed.length < VALIDATION_LIMITS.taskTextMin || !active) return;
    updateProject(active.id, function (p) {
      p.tasks.push({ id: generateId(), text: trimmed, lane: lane, done: false, createdAt: Date.now() });
      return p;
    });
    var input = document.querySelector('.add-task-row input[data-lane="' + lane + '"]');
    if (input) input.value = "";
  }

  function toggleTask(taskId) {
    var active = getActiveProject();
    if (!active) return;
    updateProject(active.id, function (p) {
      p.tasks = p.tasks.map(function (t) {
        if (t.id === taskId) t.done = !t.done;
        return t;
      });
      return p;
    });
  }

  function deleteTask(taskId) {
    var active = getActiveProject();
    if (!active) return;
    updateProject(active.id, function (p) {
      p.tasks = p.tasks.filter(function (t) { return t.id !== taskId; });
      return p;
    });
  }

  function moveTask(taskId, newLane) {
    var active = getActiveProject();
    if (!active) return;
    updateProject(active.id, function (p) {
      p.tasks = p.tasks.map(function (t) {
        if (t.id === taskId) t.lane = newLane;
        return t;
      });
      return p;
    });
  }

  function saveTaskEdit(taskId, text) {
    var trimmed = sanitizeText(text, VALIDATION_LIMITS.taskTextMax);
    var active = getActiveProject();
    state.editingTask = null;
    if (trimmed.length < VALIDATION_LIMITS.taskTextMin || !active) { render(); return; }
    updateProject(active.id, function (p) {
      p.tasks = p.tasks.map(function (t) {
        if (t.id === taskId) t.text = trimmed;
        return t;
      });
      return p;
    });
  }

  function renameProject(id, name) {
    var trimmed = sanitizeText(name, VALIDATION_LIMITS.projectNameMax);
    state.editingProjectName = false;
    if (trimmed.length < VALIDATION_LIMITS.projectNameMin) { render(); return; }
    updateProject(id, function (p) { p.name = trimmed; return p; });
  }

  // ---------- render ----------
  function render() {
    renderSidebar();
    renderMain();
    renderStorageWarning();
  }

  function renderSidebar() {
    var sidebar = document.getElementById("sidebar");
    var html = '<div class="sidebar-label">Proyectos</div>';

    state.projects.forEach(function (p) {
      var total = p.tasks.length;
      var done = p.tasks.filter(function (t) { return t.done; }).length;
      var isActive = p.id === state.activeProjectId;
      html += '<button class="project-item' + (isActive ? ' active' : '') + '" data-action="select-project" data-id="' + p.id + '">' +
        '<span class="dot" style="background:' + p.color + '"></span>' +
        '<span class="name">' + escapeHtml(p.name) + '</span>' +
        (total > 0 ? '<span class="count">' + done + '/' + total + '</span>' : '') +
        '</button>';
    });

    if (state.newProjectOpen) {
      html += '<div class="new-project-form">' +
        '<input type="text" id="newProjectInput" placeholder="Nombre del proyecto" autocomplete="off">' +
        '<div class="row">' +
        '<button class="btn-sm" data-action="confirm-new-project">Crear</button>' +
        '<button class="btn-sm" data-action="cancel-new-project">' + iconX(14) + '</button>' +
        '</div></div>';
    } else {
      html += '<button class="new-project-btn" data-action="open-new-project">' + iconPlus(14) + ' Nuevo proyecto</button>';
    }

    sidebar.innerHTML = html;

    if (state.newProjectOpen) {
      var input = document.getElementById("newProjectInput");
      if (input) {
        input.focus();
        input.addEventListener("keydown", function (e) {
          if (e.key === "Enter") addProject(input.value);
          if (e.key === "Escape") { state.newProjectOpen = false; render(); }
        });
      }
    }
  }

  function renderMain() {
    var main = document.getElementById("main");
    var active = getActiveProject();

    if (!active) {
      main.innerHTML = '<div class="empty-state">Cre\u00e1 un proyecto para empezar.</div>';
      return;
    }

    var total = active.tasks.length;
    var doneCount = active.tasks.filter(function (t) { return t.done; }).length;
    var pct = total ? Math.round((doneCount / total) * 100) : 0;

    var html = '<div class="project-header">' +
      '<div class="project-header-left">' +
      '<span class="project-dot" style="background:' + active.color + '"></span>';

    if (state.editingProjectName) {
      html += '<input type="text" class="project-title-input" id="projectNameInput" value="' + escapeHtml(active.name) + '">';
    } else {
      html += '<h1 class="project-title" data-action="edit-project-name" title="Click para renombrar">' + escapeHtml(active.name) + '</h1>';
    }
    html += '</div>';

    if (state.confirmDeleteProject) {
      html += '<div class="confirm-delete"><span>\u00bfEliminar proyecto?</span>' +
        '<button class="btn-sm danger" data-action="confirm-delete-project">S\u00ed, eliminar</button>' +
        '<button class="btn-sm" data-action="cancel-delete-project">Cancelar</button></div>';
    } else {
      html += '<button class="icon-btn" data-action="open-delete-project" aria-label="Eliminar proyecto">' + iconTrash(14) + '</button>';
    }
    html += '</div>';

    html += '<div class="progress-row">' +
      '<div class="progress-track"><div class="progress-fill" style="width:' + pct + '%;background:' + active.color + '"></div></div>' +
      '<span class="progress-label">' + doneCount + '/' + total + ' completadas</span>' +
      '</div>';

    LANES.forEach(function (lane) {
      var tasks = active.tasks.filter(function (t) { return t.lane === lane.key; });
      var collapsed = !!state.collapsedLanes[lane.key];
      var pending = tasks.filter(function (t) { return !t.done; }).length;
      var statusText = pending > 0 ? (pending + ' pendiente' + (pending > 1 ? 's' : '')) : (tasks.length > 0 ? 'completas' : 'vac\u00edo');

      html += '<div class="lane" data-lane="' + lane.key + '">' +
        '<button class="lane-header" data-action="toggle-lane" data-lane="' + lane.key + '">' +
        '<span class="chev">' + (collapsed ? iconChevronRight(14) : iconChevronDown(14)) + '</span>' +
        '<span class="lane-icon">' + lane.icon(15, lane.accent) + '</span>' +
        '<span class="lane-name">' + lane.label + '</span>' +
        '<span class="lane-status">' + statusText + '</span>' +
        '</button>';

      if (!collapsed) {
        html += '<div class="lane-body">';
        if (tasks.length === 0) {
          html += '<p class="lane-empty">Sin tareas todav\u00eda.</p>';
        }
        html += '<div class="task-list">';
        tasks.forEach(function (task) {
          html += '<div class="task-row" draggable="true" data-task-id="' + task.id + '">' +
            '<span class="grip">' + iconGrip(13) + '</span>' +
            '<button class="checkbox" data-action="toggle-task" data-id="' + task.id + '" style="border-color:' + (task.done ? active.color : '') + ';background:' + (task.done ? active.color : 'transparent') + '" aria-label="' + (task.done ? 'Marcar como pendiente' : 'Marcar como completada') + '">' +
            (task.done ? iconCheck(11, "white") : '') +
            '</button>';

          if (state.editingTask === task.id) {
            html += '<input type="text" class="task-edit-input" id="taskEditInput" value="' + escapeHtml(task.text) + '" data-id="' + task.id + '">';
          } else {
            html += '<span class="task-text' + (task.done ? ' done' : '') + '" data-action="edit-task" data-id="' + task.id + '">' + escapeHtml(task.text) + '</span>';
          }

          html += '<button class="task-action-btn" data-action="edit-task" data-id="' + task.id + '" aria-label="Editar tarea">' + iconPencil(12) + '</button>' +
            '<button class="task-action-btn" data-action="delete-task" data-id="' + task.id + '" aria-label="Eliminar tarea">' + iconX(13) + '</button>' +
            '</div>';
        });
        html += '</div>';

        html += '<div class="add-task-row">' +
          '<input type="text" placeholder="Agregar tarea..." data-lane="' + lane.key + '" autocomplete="off">' +
          '<button data-action="add-task" data-lane="' + lane.key + '" aria-label="Agregar tarea">' + iconPlus(14) + '</button>' +
          '</div>';

        html += '</div>';
      }
      html += '</div>';
    });

    main.innerHTML = html;

    if (state.editingProjectName) {
      var nameInput = document.getElementById("projectNameInput");
      if (nameInput) {
        nameInput.focus();
        nameInput.select();
        nameInput.addEventListener("blur", function () { renameProject(active.id, nameInput.value); });
        nameInput.addEventListener("keydown", function (e) {
          if (e.key === "Enter") nameInput.blur();
          if (e.key === "Escape") { state.editingProjectName = false; render(); }
        });
      }
    }

    if (state.editingTask) {
      var taskInput = document.getElementById("taskEditInput");
      if (taskInput) {
        taskInput.focus();
        taskInput.select();
        taskInput.addEventListener("blur", function () { saveTaskEdit(taskInput.dataset.id, taskInput.value); });
        taskInput.addEventListener("keydown", function (e) {
          if (e.key === "Enter") taskInput.blur();
          if (e.key === "Escape") { state.editingTask = null; render(); }
        });
      }
    }

    // add-task inputs (Enter key)
    main.querySelectorAll('.add-task-row input').forEach(function (input) {
      input.addEventListener("keydown", function (e) {
        if (e.key === "Enter") addTask(input.dataset.lane, input.value);
      });
    });

    // drag and drop
    main.querySelectorAll('.task-row').forEach(function (row) {
      row.addEventListener("dragstart", function (e) {
        e.dataTransfer.setData("text/plain", row.dataset.taskId);
        row.classList.add("dragging");
      });
      row.addEventListener("dragend", function () { row.classList.remove("dragging"); });
    });
    main.querySelectorAll('.lane').forEach(function (laneEl) {
      laneEl.addEventListener("dragover", function (e) { e.preventDefault(); });
      laneEl.addEventListener("drop", function (e) {
        e.preventDefault();
        var taskId = e.dataTransfer.getData("text/plain");
        if (taskId) moveTask(taskId, laneEl.dataset.lane);
      });
    });
  }

  // ---------- event delegation ----------
  document.addEventListener("click", function (e) {
    var el = e.target.closest("[data-action]");
    if (!el) return;
    var action = el.dataset.action;

    switch (action) {
      case "select-project":
        state.activeProjectId = el.dataset.id;
        state.confirmDeleteProject = false;
        state.editingProjectName = false;
        render();
        break;
      case "open-new-project":
        state.newProjectOpen = true;
        render();
        break;
      case "cancel-new-project":
        state.newProjectOpen = false;
        render();
        break;
      case "confirm-new-project":
        var ni = document.getElementById("newProjectInput");
        addProject(ni ? ni.value : "");
        break;
      case "edit-project-name":
        state.editingProjectName = true;
        render();
        break;
      case "open-delete-project":
        state.confirmDeleteProject = true;
        render();
        break;
      case "cancel-delete-project":
        state.confirmDeleteProject = false;
        render();
        break;
      case "confirm-delete-project":
        var active = getActiveProject();
        if (active) deleteProject(active.id);
        break;
      case "toggle-lane":
        var laneKey = el.dataset.lane;
        state.collapsedLanes[laneKey] = !state.collapsedLanes[laneKey];
        render();
        break;
      case "toggle-task":
        toggleTask(el.dataset.id);
        break;
      case "edit-task":
        state.editingTask = el.dataset.id;
        render();
        break;
      case "delete-task":
        deleteTask(el.dataset.id);
        break;
      case "add-task":
        var taskInput = document.querySelector('.add-task-row input[data-lane="' + el.dataset.lane + '"]');
        addTask(el.dataset.lane, taskInput ? taskInput.value : "");
        break;
    }
  });

  // ---------- init ----------
  load();
  render();
})();
</script>
</body>
</html>
