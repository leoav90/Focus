<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mis Proyectos</title>
<style>
  :root {
    --bg: #faf9f7;
    --surface: #ffffff;
    --surface-2: #f1efe9;
    --border: #e3e0d8;
    --border-strong: #cfcabe;
    --text: #232220;
    --text-2: #6b675f;
    --text-3: #9a958a;
    --danger: #b5472b;
    --danger-bg: #fbece6;
    --radius-md: 8px;
    --radius-lg: 12px;
    --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    -webkit-font-smoothing: antialiased;
  }
  body {
    min-height: 100vh;
    padding: 24px;
  }
  #app {
    max-width: 1000px;
    margin: 0 auto;
  }
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
    gap: 12px;
  }
  .header-title {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .header h1 {
    font-size: 20px;
    font-weight: 600;
    margin: 0;
  }
  .header-tools {
    display: flex;
    align-items: center;
    gap: 8px;
    position: relative;
  }
  .header .sub {
    font-size: 13px;
    color: var(--text-3);
  }
  .settings-menu {
    position: absolute;
    right: 0;
    top: calc(100% + 8px);
    width: 260px;
    padding: 6px;
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    background: var(--surface);
    box-shadow: 0 18px 45px rgba(35,34,32,0.14);
    z-index: 10;
  }
  .settings-menu button {
    width: 100%;
    display: flex;
    align-items: center;
    gap: 9px;
    border: none;
    background: transparent;
    color: var(--text);
    cursor: pointer;
    border-radius: 6px;
    padding: 9px 10px;
    text-align: left;
    font-size: 13px;
    font-family: var(--font);
  }
  .settings-menu button:hover { background: var(--surface-2); }
  .layout {
    display: flex;
    gap: 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
    min-height: 520px;
  }
  .sidebar {
    width: 220px;
    flex-shrink: 0;
    border-right: 1px solid var(--border);
    padding: 16px 10px;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .sidebar-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-3);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    padding: 4px 10px 10px;
  }
  .project-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 9px 10px;
    border-radius: var(--radius-md);
    border: none;
    background: transparent;
    cursor: pointer;
    text-align: left;
    width: 100%;
    font-size: 14px;
    font-family: var(--font);
    color: var(--text);
  }
  .project-item:hover { background: var(--surface-2); }
  .project-item.active { background: var(--surface-2); font-weight: 500; }
  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .project-item .name {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .project-item .count {
    font-size: 11px;
    color: var(--text-3);
    flex-shrink: 0;
  }
  .new-project-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 9px 10px;
    border-radius: var(--radius-md);
    border: none;
    background: transparent;
    cursor: pointer;
    font-size: 13px;
    color: var(--text-2);
    margin-top: 4px;
    font-family: var(--font);
  }
  .new-project-btn:hover { background: var(--surface-2); }
  .new-project-form {
    display: flex;
    flex-direction: column;
    gap: 6px;
    padding: 4px 10px;
  }
  .main {
    flex: 1;
    padding: 20px 28px;
    min-width: 0;
  }
  .empty-state {
    text-align: center;
    padding: 4rem 0;
    color: var(--text-2);
    font-size: 14px;
  }
  .project-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 6px;
    gap: 12px;
  }
  .project-header-left {
    display: flex;
    align-items: center;
    gap: 8px;
    flex: 1;
    min-width: 0;
  }
  .project-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .project-title {
    margin: 0;
    font-size: 19px;
    font-weight: 600;
    cursor: pointer;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .project-title-input {
    font-size: 19px;
    font-weight: 600;
    padding: 2px 6px;
    border: 1px solid var(--border-strong);
    border-radius: var(--radius-md);
    font-family: var(--font);
    background: var(--surface);
    color: var(--text);
  }
  .icon-btn {
    border: none;
    background: transparent;
    cursor: pointer;
    padding: 6px;
    border-radius: var(--radius-md);
    color: var(--text-3);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .icon-btn:hover { background: var(--surface-2); color: var(--text); }
  .confirm-delete {
    display: flex;
    gap: 6px;
    align-items: center;
    font-size: 12px;
    white-space: nowrap;
  }
  .confirm-delete span { color: var(--text-2); }
  .btn-sm {
    font-size: 12px;
    padding: 4px 10px;
    border-radius: var(--radius-md);
    border: 1px solid var(--border-strong);
    background: var(--surface);
    cursor: pointer;
    font-family: var(--font);
    color: var(--text);
  }
  .btn-sm:hover { background: var(--surface-2); }
  .btn-sm.danger { color: var(--danger); border-color: var(--danger); }
  .btn-sm.danger:hover { background: var(--danger-bg); }
  .progress-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 8px 0 22px;
  }
  .progress-track {
    flex: 1;
    height: 6px;
    border-radius: 4px;
    background: var(--surface-2);
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    transition: width 0.3s ease;
    border-radius: 4px;
  }
  .progress-label {
    font-size: 12px;
    color: var(--text-2);
    white-space: nowrap;
  }
  .lane {
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
    margin-bottom: 10px;
  }
  .lane-header {
    width: 100%;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 11px 14px;
    border: none;
    background: var(--surface-2);
    cursor: pointer;
    text-align: left;
    font-family: var(--font);
  }
  .lane-header .chev {
    color: var(--text-2);
    width: 14px;
    flex-shrink: 0;
  }
  .lane-header .lane-icon {
    flex-shrink: 0;
  }
  .lane-header .lane-name {
    font-size: 14px;
    font-weight: 600;
    flex: 1;
    color: var(--text);
  }
  .lane-header .lane-status {
    font-size: 12px;
    color: var(--text-3);
  }
  .lane-body {
    padding: 10px 14px 12px;
  }
  .lane-empty {
    font-size: 13px;
    color: var(--text-3);
    margin: 4px 0 10px;
  }
  .task-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 4px;
    border-radius: var(--radius-md);
    cursor: grab;
  }
  .task-row:hover { background: var(--surface-2); }
  .task-row.dragging { opacity: 0.4; }
  .grip {
    color: var(--text-3);
    flex-shrink: 0;
    cursor: grab;
  }
  .checkbox {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    border: 1.5px solid var(--border-strong);
    background: transparent;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    padding: 0;
    cursor: pointer;
  }
  .task-text {
    font-size: 14px;
    flex: 1;
    cursor: text;
    overflow-wrap: anywhere;
    color: var(--text);
  }
  .task-text.done {
    color: var(--text-3);
    text-decoration: line-through;
  }
  .task-edit-input {
    font-size: 14px;
    flex: 1;
    padding: 3px 6px;
    border: 1px solid var(--border-strong);
    border-radius: var(--radius-md);
    font-family: var(--font);
    background: var(--surface);
    color: var(--text);
  }
  .task-action-btn {
    padding: 4px;
    flex-shrink: 0;
    border: none;
    background: transparent;
    color: var(--text-3);
    cursor: pointer;
    border-radius: 6px;
    display: flex;
    align-items: center;
  }
  .task-action-btn:hover { background: var(--border); color: var(--text); }
  .add-task-row {
    display: flex;
    gap: 6px;
    margin-top: 8px;
  }
  .add-task-row input {
    flex: 1;
    font-size: 13px;
    padding: 7px 10px;
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    font-family: var(--font);
    background: var(--surface);
    color: var(--text);
  }
  .add-task-row input:focus, .new-project-form input:focus, .task-edit-input:focus, .project-title-input:focus {
    outline: none;
    border-color: var(--border-strong);
    box-shadow: 0 0 0 2px rgba(0,0,0,0.04);
  }
  .add-task-row button {
    padding: 7px 11px;
    border-radius: var(--radius-md);
    border: 1px solid var(--border-strong);
    background: var(--surface);
    cursor: pointer;
    display: flex;
    align-items: center;
  }
  .add-task-row button:hover { background: var(--surface-2); }
  .new-project-form input {
    font-size: 13px;
    padding: 7px 10px;
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    font-family: var(--font);
    background: var(--surface);
    color: var(--text);
    width: 100%;
  }
  .new-project-form .row { display: flex; gap: 6px; }
  .new-project-form .row button { flex: 1; }
  .toast {
    font-size: 12px;
    color: var(--danger);
    margin-bottom: 14px;
    padding: 8px 12px;
    background: var(--danger-bg);
    border-radius: var(--radius-md);
  }
  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(35,34,32,0.28);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
    z-index: 30;
  }
  .modal {
    width: min(520px, 100%);
    max-height: min(720px, calc(100vh - 32px));
    overflow: auto;
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    box-shadow: 0 24px 80px rgba(35,34,32,0.22);
    padding: 18px;
  }
  .modal h2 {
    margin: 0 0 8px;
    font-size: 18px;
    font-weight: 600;
  }
  .modal p {
    margin: 0 0 12px;
    color: var(--text-2);
    font-size: 13px;
    line-height: 1.45;
  }
  .modal-summary {
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    overflow: hidden;
    margin: 12px 0;
  }
  .modal-summary div {
    display: flex;
    justify-content: space-between;
    gap: 14px;
    padding: 9px 11px;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }
  .modal-summary div:last-child { border-bottom: none; }
  .modal-summary span:first-child { color: var(--text-2); }
  .modal-summary span:last-child { font-weight: 500; text-align: right; overflow-wrap: anywhere; }
  .modal-error {
    background: var(--danger-bg);
    color: var(--danger);
    padding: 9px 11px;
    border-radius: var(--radius-md);
    font-size: 13px;
    margin: 10px 0 12px;
  }
  .modal-actions {
    display: flex;
    flex-wrap: wrap;
    justify-content: flex-end;
    gap: 8px;
    margin-top: 14px;
  }
  .modal-actions .btn-sm { padding: 7px 12px; }
  .hidden-input { display: none; }
  @media (max-width: 640px) {
    body { padding: 12px; }
    .header { align-items: flex-start; }
    .layout { flex-direction: column; }
    .sidebar { width: 100%; border-right: none; border-bottom: 1px solid var(--border); flex-direction: row; overflow-x: auto; }
    .sidebar-label { display: none; }
    .main { padding: 16px; }
  }
  svg { display: block; }
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="header-title">
      <h1>Mis proyectos</h1>
      <span class="sub" id="saveStatus">Guardado localmente</span>
    </div>
    <div class="header-tools" id="headerTools">
      <button class="icon-btn" data-action="toggle-settings" aria-label="Configuracion" title="Configuracion"></button>
    </div>
  </div>
  <div class="layout">
    <div class="sidebar" id="sidebar"></div>
    <div class="main" id="main"></div>
  </div>
  <input class="hidden-input" type="file" id="backupFileInput" accept=".json,application/json">
</div>
<div id="modalRoot"></div>

<script>
(function () {
  "use strict";

  var SCHEMA_VERSION = 1;
  var STORAGE_KEY = "projects-data-v1";
  var APP_NAME = "Focus";
  var LOCAL_BACKUP_PREFIX = "focus-local-backup-";
  var LOCAL_BACKUP_LIMIT = 10;
  var CORRUPT_BACKUP_PREFIX = "projects-data-corrupt-backup-";
  var SAVE_DELAY_MS = 300;
  var VALIDATION_LIMITS = {
    projectNameMin: 1,
    projectNameMax: 80,
    taskTextMin: 1,
    taskTextMax: 300
  };
  var LANE_NAMES = {
    urgente: "Urgente",
    diaria: "Diaria",
    semana: "Esta semana",
    algun_dia: "Alg\u00fan d\u00eda"
  };

  var LANES = [
    { key: "urgente", label: LANE_NAMES.urgente, accent: "#B5472B", icon: iconTriangle },
    { key: "diaria", label: LANE_NAMES.diaria, accent: "#9A7B1E", icon: iconSun },
    { key: "semana", label: LANE_NAMES.semana, accent: "#3C6E52", icon: iconCalendar },
    { key: "algun_dia", label: LANE_NAMES.algun_dia, accent: "#5B6470", icon: iconCloud }
  ];

  var PROJECT_COLORS = ["#B5472B", "#9A7B1E", "#3C6E52", "#3A5A8C", "#6B4C8A", "#5B6470"];

  // ---------- icons (inline SVG, no external deps) ----------
  function svgWrap(inner, size, color) {
    return '<svg width="' + size + '" height="' + size + '" viewBox="0 0 24 24" fill="none" stroke="' + (color || "currentColor") + '" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' + inner + '</svg>';
  }
  function iconTriangle(size, color) {
    return svgWrap('<path d="M12 9v4"/><path d="M10.36 3.7a2 2 0 0 1 3.28 0l8.46 13.5a2 2 0 0 1-1.7 3.05H3.6a2 2 0 0 1-1.7-3.05Z"/><path d="M12 16h.01"/>', size, color);
  }
  function iconSun(size, color) {
    return svgWrap('<circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/>', size, color);
  }
  function iconCalendar(size, color) {
    return svgWrap('<rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4"/><path d="M8 2v4"/><path d="M3 10h18"/>', size, color);
  }
  function iconCloud(size, color) {
    return svgWrap('<path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9Z"/>', size, color);
  }
  function iconPlus(size, color) {
    return svgWrap('<path d="M5 12h14"/><path d="M12 5v14"/>', size, color);
  }
  function iconX(size, color) {
    return svgWrap('<path d="M18 6 6 18"/><path d="m6 6 12 12"/>', size, color);
  }
  function iconCheck(size, color) {
    return svgWrap('<path d="M20 6 9 17l-5-5"/>', size, color);
  }
  function iconTrash(size, color) {
    return svgWrap('<path d="M3 6h18"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><path d="M10 11v6"/><path d="M14 11v6"/>', size, color);
  }
  function iconPencil(size, color) {
    return svgWrap('<path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/>', size, color);
  }
  function iconChevronDown(size, color) {
    return svgWrap('<path d="m6 9 6 6 6-6"/>', size, color);
  }
  function iconChevronRight(size, color) {
    return svgWrap('<path d="m9 18 6-6-6-6"/>', size, color);
  }
  function iconGrip(size, color) {
    return svgWrap('<circle cx="9" cy="5" r="1"/><circle cx="9" cy="12" r="1"/><circle cx="9" cy="19" r="1"/><circle cx="15" cy="5" r="1"/><circle cx="15" cy="12" r="1"/><circle cx="15" cy="19" r="1"/>', size, color);
  }
  function iconGear(size, color) {
    return svgWrap('<path d="M12 15.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7Z"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06A1.65 1.65 0 0 0 15 19.4a1.65 1.65 0 0 0-1 .6 1.65 1.65 0 0 0-.4 1.1V21a2 2 0 1 1-4 0v-.09A1.65 1.65 0 0 0 8.6 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.6 15a1.65 1.65 0 0 0-1-.6 1.65 1.65 0 0 0-1.1-.4H2a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.6a1.65 1.65 0 0 0 .6-1V3a2 2 0 1 1 4 0v.09A1.65 1.65 0 0 0 15 4.6a1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9c.14.33.34.61.6.8.3.2.65.31 1 .3H22a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51.9Z"/>', size, color);
  }
  function iconDownload(size, color) {
    return svgWrap('<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M7 10l5 5 5-5"/><path d="M12 15V3"/>', size, color);
  }
  function iconUpload(size, color) {
    return svgWrap('<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M17 8l-5-5-5 5"/><path d="M12 3v12"/>', size, color);
  }
  function iconArchive(size, color) {
    return svgWrap('<rect x="3" y="4" width="18" height="4" rx="1"/><path d="M5 8v11a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8"/><path d="M10 12h4"/>', size, color);
  }
  function iconRotate(size, color) {
    return svgWrap('<path d="M3 12a9 9 0 1 0 3-6.7"/><path d="M3 3v6h6"/>', size, color);
  }
  function iconInfo(size, color) {
    return svgWrap('<circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/>', size, color);
  }

  // ---------- state ----------
  var state = {
    projects: [],
    activeProjectId: null,
    collapsedLanes: {},
    editingTask: null,
    editingProjectName: false,
    confirmDeleteProject: false,
    newProjectOpen: false,
    storageWarning: null,
    settingsOpen: false,
    modal: null,
    pendingImport: null
  };

  function generateId() {
    return Math.random().toString(36).slice(2, 10) + Date.now().toString(36);
  }

  function deepClone(value) {
    return JSON.parse(JSON.stringify(value));
  }

  function sanitizeText(value, maxLength) {
    var text = String(value || "").trim();
    if (typeof maxLength === "number" && maxLength > 0) {
      text = text.slice(0, maxLength);
    }
    return text;
  }

  function showSaveStatus(message) {
    var statusEl = document.getElementById("saveStatus");
    if (statusEl) statusEl.textContent = message;
  }

  function emptyProject(name, color) {
    return { id: generateId(), name: name, color: color, createdAt: Date.now(), tasks: [] };
  }

  function escapeHtml(str) {
    var div = document.createElement("div");
    div.textContent = str;
    return div.innerHTML;
  }

  // ---------- persistence ----------
  var saveTimer = null;

  function getStorageData() {
    var raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return { data: null, corrupt: false };

    try {
      return { data: JSON.parse(raw), corrupt: false };
    } catch (e) {
      var backupKey = CORRUPT_BACKUP_PREFIX + Date.now();
      try {
        localStorage.setItem(backupKey, raw);
      } catch (backupError) {
        console.error("No se pudo guardar backup de datos corruptos:", backupError);
      }
      console.error("JSON inv\u00e1lido en localStorage:", e);
      return { data: null, corrupt: true, backupKey: backupKey };
    }
  }

  function setStorageData(data) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  }

  function getPersistableData() {
    return {
      schemaVersion: SCHEMA_VERSION,
      projects: deepClone(state.projects),
      activeProjectId: state.activeProjectId
    };
  }

  function normalizeTimestamp(value) {
    var parsed = Date.parse(value);
    return isNaN(parsed) ? null : new Date(parsed).toISOString();
  }

  function normalizeLane(value) {
    for (var i = 0; i < LANES.length; i++) {
      if (LANES[i].key === value) return value;
    }
    return LANES[0].key;
  }

  function normalizeProjects(projects) {
    if (!Array.isArray(projects)) throw new Error("La copia no contiene una lista de proyectos.");

    return projects.map(function (project, projectIndex) {
      if (!project || typeof project !== "object" || Array.isArray(project)) {
        throw new Error("Hay un proyecto con formato invalido.");
      }
      var name = sanitizeText(project.name || ("Proyecto " + (projectIndex + 1)), VALIDATION_LIMITS.projectNameMax);
      var color = typeof project.color === "string" && project.color ? project.color : PROJECT_COLORS[projectIndex % PROJECT_COLORS.length];
      var tasks = Array.isArray(project.tasks) ? project.tasks : [];

      return {
        id: sanitizeText(project.id || generateId(), 120) || generateId(),
        name: name || ("Proyecto " + (projectIndex + 1)),
        color: color,
        createdAt: typeof project.createdAt === "number" ? project.createdAt : Date.now(),
        tasks: tasks.map(function (task, taskIndex) {
          if (!task || typeof task !== "object" || Array.isArray(task)) {
            throw new Error("Hay una tarea con formato invalido.");
          }
          var text = sanitizeText(task.text || ("Tarea " + (taskIndex + 1)), VALIDATION_LIMITS.taskTextMax);
          return {
            id: sanitizeText(task.id || generateId(), 120) || generateId(),
            text: text || ("Tarea " + (taskIndex + 1)),
            lane: normalizeLane(task.lane),
            done: !!task.done,
            createdAt: typeof task.createdAt === "number" ? task.createdAt : Date.now()
          };
        })
      };
    });
  }

  function migrateData(data) {
    if (!data || typeof data !== "object" || Array.isArray(data)) {
      throw new Error("El archivo no contiene un objeto de datos valido.");
    }

    var source = data.projects && Array.isArray(data.projects) ? data : (data.data && data.data.projects ? data.data : data);
    var version = source.schemaVersion || data.schemaVersion || null;
    if (version && Number(version) > SCHEMA_VERSION) {
      throw new Error("La copia usa una version de esquema mas nueva que esta app.");
    }

    var projects = normalizeProjects(source.projects);
    var activeProjectId = source.activeProjectId || (projects[0] ? projects[0].id : null);
    var activeExists = projects.some(function (p) { return p.id === activeProjectId; });

    return {
      schemaVersion: SCHEMA_VERSION,
      projects: projects,
      activeProjectId: activeExists ? activeProjectId : (projects[0] ? projects[0].id : null),
      migratedFromSchemaVersion: version || "legacy"
    };
  }

  function makeBackupPayload(data, metadata) {
    return {
      appName: APP_NAME,
      schemaVersion: SCHEMA_VERSION,
      exportedAt: new Date().toISOString(),
      projects: deepClone(data.projects || []),
      activeProjectId: data.activeProjectId || null,
      metadata: metadata || {}
    };
  }

  function listLocalBackups() {
    var backups = [];
    for (var i = 0; i < localStorage.length; i++) {
      var key = localStorage.key(i);
      if (key && key.indexOf(LOCAL_BACKUP_PREFIX) === 0) {
        try {
          var parsed = JSON.parse(localStorage.getItem(key));
          backups.push({ key: key, payload: parsed, exportedAt: parsed.exportedAt || key.replace(LOCAL_BACKUP_PREFIX, "") });
        } catch (e) {
          backups.push({ key: key, payload: null, exportedAt: key.replace(LOCAL_BACKUP_PREFIX, "") });
        }
      }
    }
    backups.sort(function (a, b) {
      return String(b.exportedAt).localeCompare(String(a.exportedAt));
    });
    return backups;
  }

  function pruneLocalBackups() {
    listLocalBackups().slice(LOCAL_BACKUP_LIMIT).forEach(function (backup) {
      localStorage.removeItem(backup.key);
    });
  }

  function createLocalBackup(reason) {
    var payload = makeBackupPayload(getPersistableData(), { type: "local-backup", reason: reason || "manual" });
    var key = LOCAL_BACKUP_PREFIX + payload.exportedAt + "-" + generateId();
    localStorage.setItem(key, JSON.stringify(payload));
    pruneLocalBackups();
    return key;
  }

  function saveImmediately(data) {
    if (saveTimer) clearTimeout(saveTimer);
    setStorageData({
      schemaVersion: SCHEMA_VERSION,
      projects: data.projects,
      activeProjectId: data.activeProjectId
    });
    showSaveStatus("Guardado localmente");
  }

  function getInitialProject() {
    return emptyProject("Mi primer proyecto", PROJECT_COLORS[0]);
  }

  function showStorageWarning(message) {
    state.storageWarning = message;
    renderStorageWarning();
  }

  function renderStorageWarning() {
    var app = document.getElementById("app");
    var existing = document.getElementById("storageWarning");
    if (existing) existing.remove();
    if (!app || !state.storageWarning) return;

    var warning = document.createElement("div");
    warning.className = "toast";
    warning.id = "storageWarning";
    warning.textContent = state.storageWarning;
    app.insertBefore(warning, app.querySelector(".layout"));
  }

  function load() {
    var storage = getStorageData();
    if (storage.data) {
      var migrated;
      try {
        migrated = migrateData(storage.data);
      } catch (e) {
        state.storageWarning = "No se pudieron migrar los datos guardados. Se inicio una version segura.";
        console.error("Error migrando datos:", e);
        migrated = null;
      }

      if (migrated) {
        if (!storage.data.schemaVersion || storage.data.schemaVersion !== SCHEMA_VERSION) {
          try {
            state.projects = migrated.projects;
            state.activeProjectId = migrated.activeProjectId;
            createLocalBackup("before-migration");
            saveImmediately(migrated);
          } catch (backupError) {
            console.error("No se pudo guardar respaldo previo a migracion:", backupError);
          }
        }
        state.projects = migrated.projects;
        state.activeProjectId = migrated.activeProjectId;
      } else {
        state.projects = [];
        state.activeProjectId = null;
      }

      if (state.projects.length === 0) {
        var p = getInitialProject();
        state.projects = [p];
        state.activeProjectId = p.id;
        saveImmediately(getPersistableData());
      }
      return;
    }

    var starter = getInitialProject();
    state.projects = [starter];
    state.activeProjectId = starter.id;

    if (storage.corrupt) {
      state.storageWarning = "No se pudieron leer los datos guardados. Se cre\u00f3 una copia de seguridad y se inici\u00f3 una versi\u00f3n segura.";
      showSaveStatus("Datos seguros sin guardar");
    }
  }

  function save() {
    showSaveStatus("Guardando...");
    if (saveTimer) clearTimeout(saveTimer);
    saveTimer = setTimeout(function () {
      try {
        setStorageData(getPersistableData());
        showSaveStatus("Guardado localmente");
      } catch (e) {
        showSaveStatus("Error al guardar");
        console.error("Error guardando:", e);
      }
    }, SAVE_DELAY_MS);
  }

  function getActiveProject() {
    var found = null;
    for (var i = 0; i < state.projects.length; i++) {
      if (state.projects[i].id === state.activeProjectId) { found = state.projects[i]; break; }
    }
    return found || state.projects[0] || null;
  }

  function updateProject(id, fn) {
    for (var i = 0; i < state.projects.length; i++) {
      if (state.projects[i].id === id) {
        state.projects[i] = fn(deepClone(state.projects[i]));
        break;
      }
    }
    save();
    render();
  }

  // ---------- backup and import ----------
  function countTasks(projects) {
    return projects.reduce(function (sum, project) {
      return sum + (Array.isArray(project.tasks) ? project.tasks.length : 0);
    }, 0);
  }

  function formatDateTime(value) {
    var parsed = Date.parse(value);
    if (isNaN(parsed)) return "Sin fecha";
    return new Date(parsed).toLocaleString("es-AR");
  }

  function buildBackupFileName() {
    var d = new Date();
    function pad(n) { return String(n).padStart(2, "0"); }
    return "focus-backup-" + d.getFullYear() + "-" + pad(d.getMonth() + 1) + "-" + pad(d.getDate()) + "-" + pad(d.getHours()) + "-" + pad(d.getMinutes()) + ".json";
  }

  function triggerDownload(filename, content) {
    var blob = new Blob([content], { type: "application/json" });
    var url = URL.createObjectURL(blob);
    var link = document.createElement("a");
    link.href = url;
    link.download = filename;
    document.body.appendChild(link);
    link.click();
    link.remove();
    URL.revokeObjectURL(url);
  }

  function exportBackupJson() {
    try {
      var payload = makeBackupPayload(getPersistableData(), {
        projectCount: state.projects.length,
        taskCount: countTasks(state.projects)
      });
      var content = JSON.stringify(payload, null, 2);
      JSON.parse(content);
      triggerDownload(buildBackupFileName(), content);
      state.settingsOpen = false;
      showSaveStatus("Exportaci\u00f3n completada");
      renderHeader();
    } catch (e) {
      showSaveStatus("Error al exportar");
      openMessageModal("No se pudo exportar", "La app no pudo construir un JSON valido para descargar.", e.message);
    }
  }

  function summarizeBackup(data) {
    return {
      projectCount: data.projects.length,
      taskCount: countTasks(data.projects),
      exportedAt: data.exportedAt || data.metadata && data.metadata.exportedAt || null,
      schemaVersion: data.schemaVersion || SCHEMA_VERSION
    };
  }

  function validateImportedBackup(rawData) {
    var migrated = migrateData(rawData);
    return {
      data: {
        schemaVersion: SCHEMA_VERSION,
        projects: migrated.projects,
        activeProjectId: migrated.activeProjectId,
        exportedAt: normalizeTimestamp(rawData.exportedAt) || null,
        originalSchemaVersion: rawData.schemaVersion || migrated.migratedFromSchemaVersion
      },
      summary: summarizeBackup({
        schemaVersion: rawData.schemaVersion || migrated.migratedFromSchemaVersion,
        exportedAt: rawData.exportedAt || null,
        projects: migrated.projects
      })
    };
  }

  function prepareImportFromFile(file) {
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function () {
      try {
        var parsed = JSON.parse(String(reader.result || ""));
        var imported = validateImportedBackup(parsed);
        state.pendingImport = imported;
        state.settingsOpen = false;
        state.modal = { type: "import-confirm" };
        render();
      } catch (e) {
        state.pendingImport = null;
        state.settingsOpen = false;
        showSaveStatus("Error al importar");
        openMessageModal("Error al importar", "El archivo no se importo porque no es un respaldo valido de Focus.", e.message);
      }
    };
    reader.onerror = function () {
      showSaveStatus("Error al importar");
      openMessageModal("Error al importar", "No se pudo leer el archivo seleccionado.", "");
    };
    reader.readAsText(file);
  }

  function remapImportedIds(projects) {
    var existingProjectIds = {};
    state.projects.forEach(function (p) { existingProjectIds[p.id] = true; });

    return projects.map(function (project) {
      var copy = deepClone(project);
      if (existingProjectIds[copy.id]) copy.id = generateId();
      existingProjectIds[copy.id] = true;
      var taskIds = {};
      copy.tasks = copy.tasks.map(function (task) {
        var taskCopy = deepClone(task);
        if (taskIds[taskCopy.id]) taskCopy.id = generateId();
        taskIds[taskCopy.id] = true;
        return taskCopy;
      });
      return copy;
    });
  }

  function applyPendingImport(mode) {
    if (!state.pendingImport) return;
    try {
      createLocalBackup("before-import");
      var imported = state.pendingImport.data;
      if (mode === "merge") {
        var incoming = remapImportedIds(imported.projects);
        var activeStillExists = state.projects.some(function (p) { return p.id === state.activeProjectId; });
        state.projects = state.projects.concat(incoming);
        state.activeProjectId = activeStillExists ? state.activeProjectId : (state.projects[0] ? state.projects[0].id : null);
      } else {
        state.projects = deepClone(imported.projects);
        state.activeProjectId = imported.activeProjectId || (state.projects[0] ? state.projects[0].id : null);
      }
      state.pendingImport = null;
      state.modal = null;
      saveImmediately(getPersistableData());
      showSaveStatus("Importaci\u00f3n completada");
      render();
    } catch (e) {
      showSaveStatus("Error al importar");
      openMessageModal("Error al importar", "No se modificaron los datos actuales.", e.message);
    }
  }

  function restoreLatestLocalBackup() {
    var latest = listLocalBackups()[0];
    if (!latest || !latest.payload) {
      openMessageModal("Sin respaldos locales", "Todavia no hay respaldos locales disponibles para restaurar.", "");
      return;
    }
    try {
      var restored = validateImportedBackup(latest.payload);
      state.pendingImport = restored;
      state.modal = { type: "restore-confirm", backupKey: latest.key };
      state.settingsOpen = false;
      render();
    } catch (e) {
      openMessageModal("Respaldo local invalido", "El ultimo respaldo local no pudo leerse.", e.message);
    }
  }

  function applyPendingRestore() {
    if (!state.pendingImport) return;
    try {
      createLocalBackup("before-restore");
      var restored = state.pendingImport.data;
      state.projects = deepClone(restored.projects);
      state.activeProjectId = restored.activeProjectId || (state.projects[0] ? state.projects[0].id : null);
      state.pendingImport = null;
      state.modal = null;
      saveImmediately(getPersistableData());
      showSaveStatus("Importaci\u00f3n completada");
      render();
    } catch (e) {
      showSaveStatus("Error al importar");
      openMessageModal("Error al restaurar", "No se modificaron los datos actuales.", e.message);
    }
  }

  function openStorageInfo() {
    state.settingsOpen = false;
    state.modal = { type: "storage-info" };
    render();
  }

  function openMessageModal(title, message, detail) {
    state.settingsOpen = false;
    state.modal = { type: "message", title: title, message: message, detail: detail || "" };
    render();
  }

  // ---------- actions ----------
  function addProject(name) {
    var trimmed = sanitizeText(name, VALIDATION_LIMITS.projectNameMax);
    if (trimmed.length < VALIDATION_LIMITS.projectNameMin) return;
    var color = PROJECT_COLORS[state.projects.length % PROJECT_COLORS.length];
    var p = emptyProject(trimmed, color);
    state.projects.push(p);
    state.activeProjectId = p.id;
    state.newProjectOpen = false;
    save();
    render();
  }

  function deleteProject(id) {
    state.projects = state.projects.filter(function (p) { return p.id !== id; });
    if (state.activeProjectId === id) {
      state.activeProjectId = state.projects[0] ? state.projects[0].id : null;
    }
    state.confirmDeleteProject = false;
    save();
    render();
  }

  function addTask(lane, text) {
    var trimmed = sanitizeText(text, VALIDATION_LIMITS.taskTextMax);
    var active = getActiveProject();
    if (trimmed.length < VALIDATION_LIMITS.taskTextMin || !active) return;
    updateProject(active.id, function (p) {
      p.tasks.push({ id: generateId(), text: trimmed, lane: lane, done: false, createdAt: Date.now() });
      return p;
    });
    var input = document.querySelector('.add-task-row input[data-lane="' + lane + '"]');
    if (input) input.value = "";
  }

  function toggleTask(taskId) {
    var active = getActiveProject();
    if (!active) return;
    updateProject(active.id, function (p) {
      p.tasks = p.tasks.map(function (t) {
        if (t.id === taskId) t.done = !t.done;
        return t;
      });
      return p;
    });
  }

  function deleteTask(taskId) {
    var active = getActiveProject();
    if (!active) return;
    updateProject(active.id, function (p) {
      p.tasks = p.tasks.filter(function (t) { return t.id !== taskId; });
      return p;
    });
  }

  function moveTask(taskId, newLane) {
    var active = getActiveProject();
    if (!active) return;
    updateProject(active.id, function (p) {
      p.tasks = p.tasks.map(function (t) {
        if (t.id === taskId) t.lane = newLane;
        return t;
      });
      return p;
    });
  }

  function saveTaskEdit(taskId, text) {
    var trimmed = sanitizeText(text, VALIDATION_LIMITS.taskTextMax);
    var active = getActiveProject();
    state.editingTask = null;
    if (trimmed.length < VALIDATION_LIMITS.taskTextMin || !active) { render(); return; }
    updateProject(active.id, function (p) {
      p.tasks = p.tasks.map(function (t) {
        if (t.id === taskId) t.text = trimmed;
        return t;
      });
      return p;
    });
  }

  function renameProject(id, name) {
    var trimmed = sanitizeText(name, VALIDATION_LIMITS.projectNameMax);
    state.editingProjectName = false;
    if (trimmed.length < VALIDATION_LIMITS.projectNameMin) { render(); return; }
    updateProject(id, function (p) { p.name = trimmed; return p; });
  }

  // ---------- render ----------
  function render() {
    renderHeader();
    renderSidebar();
    renderMain();
    renderStorageWarning();
    renderModal();
  }

  function renderHeader() {
    var tools = document.getElementById("headerTools");
    if (!tools) return;
    var html = '<button class="icon-btn" data-action="toggle-settings" aria-label="Configuracion" title="Configuracion">' + iconGear(17) + '</button>';

    if (state.settingsOpen) {
      html += '<div class="settings-menu">' +
        '<button data-action="export-backup">' + iconDownload(15) + '<span>Exportar respaldo JSON</span></button>' +
        '<button data-action="open-import">' + iconUpload(15) + '<span>Importar respaldo JSON</span></button>' +
        '<button data-action="create-local-backup">' + iconArchive(15) + '<span>Crear respaldo local</span></button>' +
        '<button data-action="restore-local-backup">' + iconRotate(15) + '<span>Restaurar \u00faltimo respaldo local</span></button>' +
        '<button data-action="storage-info">' + iconInfo(15) + '<span>Ver informaci\u00f3n de almacenamiento</span></button>' +
        '</div>';
    }
    tools.innerHTML = html;
  }

  function summaryHtml(summary) {
    return '<div class="modal-summary">' +
      '<div><span>Proyectos</span><span>' + summary.projectCount + '</span></div>' +
      '<div><span>Tareas</span><span>' + summary.taskCount + '</span></div>' +
      '<div><span>Fecha de exportacion</span><span>' + escapeHtml(formatDateTime(summary.exportedAt)) + '</span></div>' +
      '<div><span>Version del esquema</span><span>' + escapeHtml(String(summary.schemaVersion || "legacy")) + '</span></div>' +
      '</div>';
  }

  function storageInfoHtml() {
    var current = getPersistableData();
    var backups = listLocalBackups();
    var totalChars = 0;
    for (var i = 0; i < localStorage.length; i++) {
      var key = localStorage.key(i);
      totalChars += String(key).length + String(localStorage.getItem(key) || "").length;
    }
    var last = backups[0] && backups[0].payload ? backups[0].payload.exportedAt : null;
    return '<div class="modal-summary">' +
      '<div><span>Persistencia principal</span><span>' + STORAGE_KEY + '</span></div>' +
      '<div><span>Version actual</span><span>' + SCHEMA_VERSION + '</span></div>' +
      '<div><span>Proyectos actuales</span><span>' + current.projects.length + '</span></div>' +
      '<div><span>Tareas actuales</span><span>' + countTasks(current.projects) + '</span></div>' +
      '<div><span>Respaldos locales</span><span>' + backups.length + '/' + LOCAL_BACKUP_LIMIT + '</span></div>' +
      '<div><span>Ultimo respaldo</span><span>' + escapeHtml(formatDateTime(last)) + '</span></div>' +
      '<div><span>Uso local aproximado</span><span>' + Math.round(totalChars / 1024) + ' KB</span></div>' +
      '</div>';
  }

  function renderModal() {
    var root = document.getElementById("modalRoot");
    if (!root) return;
    if (!state.modal) {
      root.innerHTML = "";
      return;
    }

    var html = '<div class="modal-backdrop" data-action="close-modal"><div class="modal" role="dialog" aria-modal="true" data-modal-panel>';
    if (state.modal.type === "import-confirm" && state.pendingImport) {
      html += '<h2>Importar respaldo</h2>' +
        '<p>Revisa el resumen antes de modificar los datos actuales. Se creara un respaldo local automatico antes de importar.</p>' +
        summaryHtml(state.pendingImport.summary) +
        '<div class="modal-actions">' +
        '<button class="btn-sm" data-action="close-modal">Cancelar</button>' +
        '<button class="btn-sm" data-action="confirm-import-merge">Fusionar con datos actuales</button>' +
        '<button class="btn-sm danger" data-action="confirm-import-replace">Reemplazar datos actuales</button>' +
        '</div>';
    } else if (state.modal.type === "restore-confirm" && state.pendingImport) {
      html += '<h2>Restaurar respaldo local</h2>' +
        '<p>Esto reemplazara los datos actuales por el ultimo respaldo local. Tambien se guardara un respaldo local del estado actual antes de restaurar.</p>' +
        summaryHtml(state.pendingImport.summary) +
        '<div class="modal-actions">' +
        '<button class="btn-sm" data-action="close-modal">Cancelar</button>' +
        '<button class="btn-sm danger" data-action="confirm-restore-local">Restaurar</button>' +
        '</div>';
    } else if (state.modal.type === "storage-info") {
      html += '<h2>Almacenamiento</h2>' +
        '<p>Focus mantiene localStorage como persistencia principal y conserva los ultimos respaldos locales separados.</p>' +
        storageInfoHtml() +
        '<div class="modal-actions"><button class="btn-sm" data-action="close-modal">Cerrar</button></div>';
    } else if (state.modal.type === "message") {
      html += '<h2>' + escapeHtml(state.modal.title) + '</h2>' +
        '<p>' + escapeHtml(state.modal.message) + '</p>' +
        (state.modal.detail ? '<div class="modal-error">' + escapeHtml(state.modal.detail) + '</div>' : '') +
        '<div class="modal-actions"><button class="btn-sm" data-action="close-modal">Cerrar</button></div>';
    }
    html += '</div></div>';
    root.innerHTML = html;
  }

  function renderSidebar() {
    var sidebar = document.getElementById("sidebar");
    var html = '<div class="sidebar-label">Proyectos</div>';

    state.projects.forEach(function (p) {
      var total = p.tasks.length;
      var done = p.tasks.filter(function (t) { return t.done; }).length;
      var isActive = p.id === state.activeProjectId;
      html += '<button class="project-item' + (isActive ? ' active' : '') + '" data-action="select-project" data-id="' + p.id + '">' +
        '<span class="dot" style="background:' + p.color + '"></span>' +
        '<span class="name">' + escapeHtml(p.name) + '</span>' +
        (total > 0 ? '<span class="count">' + done + '/' + total + '</span>' : '') +
        '</button>';
    });

    if (state.newProjectOpen) {
      html += '<div class="new-project-form">' +
        '<input type="text" id="newProjectInput" placeholder="Nombre del proyecto" autocomplete="off">' +
        '<div class="row">' +
        '<button class="btn-sm" data-action="confirm-new-project">Crear</button>' +
        '<button class="btn-sm" data-action="cancel-new-project">' + iconX(14) + '</button>' +
        '</div></div>';
    } else {
      html += '<button class="new-project-btn" data-action="open-new-project">' + iconPlus(14) + ' Nuevo proyecto</button>';
    }

    sidebar.innerHTML = html;

    if (state.newProjectOpen) {
      var input = document.getElementById("newProjectInput");
      if (input) {
        input.focus();
        input.addEventListener("keydown", function (e) {
          if (e.key === "Enter") addProject(input.value);
          if (e.key === "Escape") { state.newProjectOpen = false; render(); }
        });
      }
    }
  }

  function renderMain() {
    var main = document.getElementById("main");
    var active = getActiveProject();

    if (!active) {
      main.innerHTML = '<div class="empty-state">Cre\u00e1 un proyecto para empezar.</div>';
      return;
    }

    var total = active.tasks.length;
    var doneCount = active.tasks.filter(function (t) { return t.done; }).length;
    var pct = total ? Math.round((doneCount / total) * 100) : 0;

    var html = '<div class="project-header">' +
      '<div class="project-header-left">' +
      '<span class="project-dot" style="background:' + active.color + '"></span>';

    if (state.editingProjectName) {
      html += '<input type="text" class="project-title-input" id="projectNameInput" value="' + escapeHtml(active.name) + '">';
    } else {
      html += '<h1 class="project-title" data-action="edit-project-name" title="Click para renombrar">' + escapeHtml(active.name) + '</h1>';
    }
    html += '</div>';

    if (state.confirmDeleteProject) {
      html += '<div class="confirm-delete"><span>\u00bfEliminar proyecto?</span>' +
        '<button class="btn-sm danger" data-action="confirm-delete-project">S\u00ed, eliminar</button>' +
        '<button class="btn-sm" data-action="cancel-delete-project">Cancelar</button></div>';
    } else {
      html += '<button class="icon-btn" data-action="open-delete-project" aria-label="Eliminar proyecto">' + iconTrash(14) + '</button>';
    }
    html += '</div>';

    html += '<div class="progress-row">' +
      '<div class="progress-track"><div class="progress-fill" style="width:' + pct + '%;background:' + active.color + '"></div></div>' +
      '<span class="progress-label">' + doneCount + '/' + total + ' completadas</span>' +
      '</div>';

    LANES.forEach(function (lane) {
      var tasks = active.tasks.filter(function (t) { return t.lane === lane.key; });
      var collapsed = !!state.collapsedLanes[lane.key];
      var pending = tasks.filter(function (t) { return !t.done; }).length;
      var statusText = pending > 0 ? (pending + ' pendiente' + (pending > 1 ? 's' : '')) : (tasks.length > 0 ? 'completas' : 'vac\u00edo');

      html += '<div class="lane" data-lane="' + lane.key + '">' +
        '<button class="lane-header" data-action="toggle-lane" data-lane="' + lane.key + '">' +
        '<span class="chev">' + (collapsed ? iconChevronRight(14) : iconChevronDown(14)) + '</span>' +
        '<span class="lane-icon">' + lane.icon(15, lane.accent) + '</span>' +
        '<span class="lane-name">' + lane.label + '</span>' +
        '<span class="lane-status">' + statusText + '</span>' +
        '</button>';

      if (!collapsed) {
        html += '<div class="lane-body">';
        if (tasks.length === 0) {
          html += '<p class="lane-empty">Sin tareas todav\u00eda.</p>';
        }
        html += '<div class="task-list">';
        tasks.forEach(function (task) {
          html += '<div class="task-row" draggable="true" data-task-id="' + task.id + '">' +
            '<span class="grip">' + iconGrip(13) + '</span>' +
            '<button class="checkbox" data-action="toggle-task" data-id="' + task.id + '" style="border-color:' + (task.done ? active.color : '') + ';background:' + (task.done ? active.color : 'transparent') + '" aria-label="' + (task.done ? 'Marcar como pendiente' : 'Marcar como completada') + '">' +
            (task.done ? iconCheck(11, "white") : '') +
            '</button>';

          if (state.editingTask === task.id) {
            html += '<input type="text" class="task-edit-input" id="taskEditInput" value="' + escapeHtml(task.text) + '" data-id="' + task.id + '">';
          } else {
            html += '<span class="task-text' + (task.done ? ' done' : '') + '" data-action="edit-task" data-id="' + task.id + '">' + escapeHtml(task.text) + '</span>';
          }

          html += '<button class="task-action-btn" data-action="edit-task" data-id="' + task.id + '" aria-label="Editar tarea">' + iconPencil(12) + '</button>' +
            '<button class="task-action-btn" data-action="delete-task" data-id="' + task.id + '" aria-label="Eliminar tarea">' + iconX(13) + '</button>' +
            '</div>';
        });
        html += '</div>';

        html += '<div class="add-task-row">' +
          '<input type="text" placeholder="Agregar tarea..." data-lane="' + lane.key + '" autocomplete="off">' +
          '<button data-action="add-task" data-lane="' + lane.key + '" aria-label="Agregar tarea">' + iconPlus(14) + '</button>' +
          '</div>';

        html += '</div>';
      }
      html += '</div>';
    });

    main.innerHTML = html;

    if (state.editingProjectName) {
      var nameInput = document.getElementById("projectNameInput");
      if (nameInput) {
        nameInput.focus();
        nameInput.select();
        nameInput.addEventListener("blur", function () { renameProject(active.id, nameInput.value); });
        nameInput.addEventListener("keydown", function (e) {
          if (e.key === "Enter") nameInput.blur();
          if (e.key === "Escape") { state.editingProjectName = false; render(); }
        });
      }
    }

    if (state.editingTask) {
      var taskInput = document.getElementById("taskEditInput");
      if (taskInput) {
        taskInput.focus();
        taskInput.select();
        taskInput.addEventListener("blur", function () { saveTaskEdit(taskInput.dataset.id, taskInput.value); });
        taskInput.addEventListener("keydown", function (e) {
          if (e.key === "Enter") taskInput.blur();
          if (e.key === "Escape") { state.editingTask = null; render(); }
        });
      }
    }

    // add-task inputs (Enter key)
    main.querySelectorAll('.add-task-row input').forEach(function (input) {
      input.addEventListener("keydown", function (e) {
        if (e.key === "Enter") addTask(input.dataset.lane, input.value);
      });
    });

    // drag and drop
    main.querySelectorAll('.task-row').forEach(function (row) {
      row.addEventListener("dragstart", function (e) {
        e.dataTransfer.setData("text/plain", row.dataset.taskId);
        row.classList.add("dragging");
      });
      row.addEventListener("dragend", function () { row.classList.remove("dragging"); });
    });
    main.querySelectorAll('.lane').forEach(function (laneEl) {
      laneEl.addEventListener("dragover", function (e) { e.preventDefault(); });
      laneEl.addEventListener("drop", function (e) {
        e.preventDefault();
        var taskId = e.dataTransfer.getData("text/plain");
        if (taskId) moveTask(taskId, laneEl.dataset.lane);
      });
    });
  }

  // ---------- event delegation ----------
  document.addEventListener("click", function (e) {
    if (e.target.closest("[data-modal-panel]") && !e.target.closest("[data-modal-panel] [data-action]")) return;
    var el = e.target.closest("[data-action]");
    if (!el) {
      if (state.settingsOpen && !e.target.closest("#headerTools")) {
        state.settingsOpen = false;
        renderHeader();
      }
      return;
    }
    var action = el.dataset.action;

    switch (action) {
      case "toggle-settings":
        state.settingsOpen = !state.settingsOpen;
        renderHeader();
        break;
      case "export-backup":
        exportBackupJson();
        break;
      case "open-import":
        state.settingsOpen = false;
        renderHeader();
        var fileInput = document.getElementById("backupFileInput");
        if (fileInput) {
          fileInput.value = "";
          fileInput.click();
        }
        break;
      case "create-local-backup":
        try {
          createLocalBackup("manual");
          state.settingsOpen = false;
          showSaveStatus("Respaldo local creado");
          renderHeader();
        } catch (e) {
          openMessageModal("No se pudo crear el respaldo", "localStorage no permitio guardar una copia local.", e.message);
        }
        break;
      case "restore-local-backup":
        restoreLatestLocalBackup();
        break;
      case "storage-info":
        openStorageInfo();
        break;
      case "close-modal":
        state.modal = null;
        state.pendingImport = null;
        render();
        break;
      case "confirm-import-replace":
        applyPendingImport("replace");
        break;
      case "confirm-import-merge":
        applyPendingImport("merge");
        break;
      case "confirm-restore-local":
        applyPendingRestore();
        break;
      case "select-project":
        state.activeProjectId = el.dataset.id;
        state.confirmDeleteProject = false;
        state.editingProjectName = false;
        render();
        break;
      case "open-new-project":
        state.newProjectOpen = true;
        render();
        break;
      case "cancel-new-project":
        state.newProjectOpen = false;
        render();
        break;
      case "confirm-new-project":
        var ni = document.getElementById("newProjectInput");
        addProject(ni ? ni.value : "");
        break;
      case "edit-project-name":
        state.editingProjectName = true;
        render();
        break;
      case "open-delete-project":
        state.confirmDeleteProject = true;
        render();
        break;
      case "cancel-delete-project":
        state.confirmDeleteProject = false;
        render();
        break;
      case "confirm-delete-project":
        var active = getActiveProject();
        if (active) deleteProject(active.id);
        break;
      case "toggle-lane":
        var laneKey = el.dataset.lane;
        state.collapsedLanes[laneKey] = !state.collapsedLanes[laneKey];
        render();
        break;
      case "toggle-task":
        toggleTask(el.dataset.id);
        break;
      case "edit-task":
        state.editingTask = el.dataset.id;
        render();
        break;
      case "delete-task":
        deleteTask(el.dataset.id);
        break;
      case "add-task":
        var taskInput = document.querySelector('.add-task-row input[data-lane="' + el.dataset.lane + '"]');
        addTask(el.dataset.lane, taskInput ? taskInput.value : "");
        break;
    }
  });

  document.addEventListener("keydown", function (e) {
    if (e.key === "Escape" && state.modal) {
      state.modal = null;
      state.pendingImport = null;
      render();
    }
  });

  var backupFileInput = document.getElementById("backupFileInput");
  if (backupFileInput) {
    backupFileInput.addEventListener("change", function () {
      prepareImportFromFile(backupFileInput.files && backupFileInput.files[0]);
    });
  }

  // ---------- init ----------
  load();
  render();
})();
</script>
</body>
</html>
