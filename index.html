<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mis Proyectos</title>
<style>
  :root {
    --bg: #faf9f7;
    --surface: #ffffff;
    --surface-2: #f1efe9;
    --border: #e3e0d8;
    --border-strong: #cfcabe;
    --text: #232220;
    --text-2: #6b675f;
    --text-3: #7f796f;
    --danger: #b5472b;
    --danger-bg: #fbece6;
    --radius-md: 8px;
    --radius-lg: 12px;
    --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    -webkit-font-smoothing: antialiased;
  }
  body {
    min-height: 100vh;
    padding: 24px;
  }
  #app {
    max-width: 1000px;
    margin: 0 auto;
  }
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
    gap: 12px;
  }
  .header-title {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .header h1 {
    font-size: 20px;
    font-weight: 600;
    margin: 0;
  }
  .global-search {
    flex: 1;
    max-width: 360px;
  }
  .global-search input {
    width: 100%;
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    background: var(--surface);
    color: var(--text);
    font-family: var(--font);
    font-size: 13px;
    padding: 8px 10px;
  }
  .global-search input:focus {
    outline: none;
    border-color: var(--border-strong);
    box-shadow: 0 0 0 2px rgba(0,0,0,0.04);
  }
  .header-tools {
    display: flex;
    align-items: center;
    gap: 8px;
    position: relative;
  }
  .header .sub {
    align-self: flex-start;
    display: inline-flex;
    align-items: center;
    font-size: 13px;
    color: var(--text-3);
    background: #f4f2ec;
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 2px 8px;
  }
  .settings-menu {
    position: absolute;
    right: 0;
    top: calc(100% + 8px);
    width: 260px;
    padding: 6px;
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    background: var(--surface);
    box-shadow: 0 18px 45px rgba(35,34,32,0.14);
    z-index: 10;
  }
  .settings-menu button {
    width: 100%;
    display: flex;
    align-items: center;
    gap: 9px;
    border: none;
    background: transparent;
    color: var(--text);
    cursor: pointer;
    border-radius: 6px;
    padding: 9px 10px;
    text-align: left;
    font-size: 13px;
    font-family: var(--font);
    transition: background 0.16s ease, color 0.16s ease, transform 0.12s ease;
  }
  .settings-menu button:hover { background: var(--surface-2); }
  .layout {
    display: flex;
    gap: 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
    min-height: 520px;
  }
  .sidebar {
    width: 220px;
    flex-shrink: 0;
    border-right: 1px solid var(--border);
    padding: 16px 10px;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .sidebar-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-3);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    padding: 4px 10px 10px;
  }
  .project-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 9px 10px;
    border-radius: var(--radius-md);
    border: none;
    background: transparent;
    cursor: pointer;
    text-align: left;
    width: 100%;
    font-size: 14px;
    font-family: var(--font);
    color: var(--text);
    transition: background 0.16s ease, color 0.16s ease, transform 0.16s ease;
  }
  .project-item:hover { background: var(--surface-2); transform: translateX(1px); }
  .project-item.active { background: var(--surface-2); font-weight: 500; }
  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .project-item .name {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .project-item .count {
    font-size: 11px;
    color: var(--text-3);
    flex-shrink: 0;
  }
  .new-project-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 9px 10px;
    border-radius: var(--radius-md);
    border: none;
    background: transparent;
    cursor: pointer;
    font-size: 13px;
    color: var(--text-2);
    margin-top: 4px;
    font-family: var(--font);
    transition: background 0.16s ease, color 0.16s ease, transform 0.12s ease;
  }
  .new-project-btn:hover { background: var(--surface-2); }
  .new-project-form {
    display: flex;
    flex-direction: column;
    gap: 6px;
    padding: 4px 10px;
  }
  .main {
    flex: 1;
    padding: 20px 28px;
    min-width: 0;
  }
  .empty-state {
    text-align: center;
    padding: 3rem 1rem;
    color: var(--text-2);
    font-size: 14px;
    border: 1px dashed var(--border-strong);
    border-radius: var(--radius-lg);
    background: #fbfaf8;
  }
  .project-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 6px;
    gap: 12px;
  }
  .project-header-left {
    display: flex;
    align-items: center;
    gap: 8px;
    flex: 1;
    min-width: 0;
  }
  .project-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .project-title {
    margin: 0;
    font-size: 19px;
    font-weight: 600;
    cursor: pointer;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .project-title-input {
    font-size: 19px;
    font-weight: 600;
    padding: 2px 6px;
    border: 1px solid var(--border-strong);
    border-radius: var(--radius-md);
    font-family: var(--font);
    background: var(--surface);
    color: var(--text);
  }
  .icon-btn {
    border: none;
    background: transparent;
    cursor: pointer;
    padding: 6px;
    border-radius: var(--radius-md);
    color: var(--text-3);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.16s ease, color 0.16s ease, transform 0.16s ease;
  }
  .icon-btn:hover { background: var(--surface-2); color: var(--text); transform: translateY(-1px); }
  .confirm-delete {
    display: flex;
    gap: 6px;
    align-items: center;
    font-size: 12px;
    white-space: nowrap;
  }
  .confirm-delete span { color: var(--text-2); }
  .btn-sm {
    font-size: 12px;
    padding: 4px 10px;
    border-radius: var(--radius-md);
    border: 1px solid var(--border-strong);
    background: var(--surface);
    cursor: pointer;
    font-family: var(--font);
    color: var(--text);
    min-height: 30px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: background 0.16s ease, border-color 0.16s ease, color 0.16s ease, transform 0.12s ease;
  }
  .btn-sm:hover { background: var(--surface-2); }
  .btn-sm:disabled {
    opacity: 0.55;
    cursor: not-allowed;
    background: var(--surface-2);
    color: var(--text-3);
  }
  .btn-sm:disabled:hover { background: var(--surface-2); }
  .btn-sm.danger { color: var(--danger); border-color: var(--danger); }
  .btn-sm.danger:hover { background: var(--danger-bg); }
  .progress-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 8px 0 22px;
  }
  .progress-track {
    flex: 1;
    height: 6px;
    border-radius: 4px;
    background: var(--surface-2);
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    transition: width 0.3s ease;
    border-radius: 4px;
  }
  .progress-label {
    font-size: 12px;
    color: var(--text-2);
    white-space: nowrap;
  }
  .lane {
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
    margin-bottom: 10px;
  }
  .lane-header {
    width: 100%;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 11px 14px;
    border: none;
    background: var(--surface-2);
    cursor: pointer;
    text-align: left;
    font-family: var(--font);
    transition: background 0.16s ease, transform 0.12s ease;
  }
  .lane-header:hover { background: #ebe8df; }
  .lane-header .chev {
    color: var(--text-2);
    width: 14px;
    flex-shrink: 0;
  }
  .lane-header .lane-icon {
    flex-shrink: 0;
  }
  .lane-header .lane-name {
    font-size: 14px;
    font-weight: 600;
    flex: 1;
    color: var(--text);
  }
  .lane-header .lane-status {
    font-size: 12px;
    color: var(--text-3);
  }
  .lane-body {
    padding: 10px 14px 12px;
  }
  .lane-empty {
    font-size: 13px;
    color: var(--text-3);
    margin: 4px 0 10px;
    padding: 10px 12px;
    border: 1px dashed var(--border);
    border-radius: var(--radius-md);
    background: #fbfaf8;
  }
  .task-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 6px;
    border-radius: var(--radius-md);
    cursor: grab;
    transition: background 0.16s ease, box-shadow 0.16s ease, opacity 0.16s ease;
  }
  .task-row:hover { background: var(--surface-2); }
  .task-row.dragging { opacity: 0.4; }
  .task-row.completed { opacity: 0.84; }
  .task-row.overdue { background: #fff1ec; }
  .task-row.due-today { background: #fff8df; }
  .task-row.due-tomorrow { background: #eef7f1; }
  .task-row.blocked { box-shadow: inset 3px 0 0 var(--danger); }
  .task-row.high-priority { box-shadow: inset 3px 0 0 #b5472b; }
  .task-row.blocked.high-priority { box-shadow: inset 3px 0 0 var(--danger), inset 6px 0 0 #9a7b1e; }
  .grip {
    color: var(--text-3);
    flex-shrink: 0;
    cursor: grab;
  }
  .checkbox {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    border: 1.5px solid var(--border-strong);
    background: transparent;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    padding: 0;
    cursor: pointer;
    transition: background 0.16s ease, border-color 0.16s ease, transform 0.16s ease;
  }
  .checkbox:hover { transform: scale(1.05); }
  .task-text {
    font-size: 14px;
    flex: 1;
    cursor: text;
    overflow-wrap: anywhere;
    color: var(--text);
  }
  .task-text.done {
    color: var(--text-2);
    text-decoration: line-through;
  }
  .task-content {
    display: flex;
    flex-direction: column;
    gap: 3px;
    flex: 1;
    min-width: 0;
  }
  .task-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    font-size: 11px;
    color: var(--text-2);
  }
  .task-pill {
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 1px 7px;
    background: var(--surface);
    line-height: 1.5;
  }
  .task-pill.warning { border-color: #d7b23f; background: #fff8df; color: #765d0d; }
  .task-pill.danger { border-color: #e1a28f; background: var(--danger-bg); color: var(--danger); }
  .task-pill.success { border-color: #a8c9b3; background: #eef7f1; color: #2f6846; }
  .task-note-toggle {
    align-self: flex-start;
    display: inline-flex;
    align-items: center;
    gap: 5px;
    border: 1px solid var(--border);
    border-radius: 999px;
    background: #fbfaf8;
    color: var(--text-2);
    cursor: pointer;
    font-family: var(--font);
    font-size: 11px;
    padding: 2px 7px;
  }
  .task-note-toggle:hover { background: var(--surface-2); color: var(--text); }
  .task-note-body {
    border-left: 2px solid var(--border-strong);
    color: var(--text-2);
    font-size: 12px;
    line-height: 1.45;
    margin-top: 2px;
    padding: 2px 0 2px 8px;
    white-space: pre-wrap;
  }
  .subtask-list {
    display: flex;
    flex-direction: column;
    gap: 5px;
    margin-top: 4px;
  }
  .subtask-row {
    display: flex;
    align-items: center;
    gap: 6px;
    color: var(--text-2);
    font-size: 12px;
  }
  .subtask-row.done .subtask-text {
    color: var(--text-3);
    text-decoration: line-through;
  }
  .subtask-check {
    width: 14px;
    height: 14px;
    border-radius: 4px;
    border: 1px solid var(--border-strong);
    background: var(--surface);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    padding: 0;
    cursor: pointer;
  }
  .subtask-text {
    flex: 1;
    min-width: 0;
    overflow-wrap: anywhere;
  }
  .subtask-delete {
    border: none;
    background: transparent;
    color: var(--text-3);
    cursor: pointer;
    padding: 2px;
    border-radius: 5px;
    display: inline-flex;
  }
  .subtask-delete:hover { background: var(--surface-2); color: var(--text); }
  .subtask-add {
    display: flex;
    gap: 6px;
    margin-top: 2px;
  }
  .subtask-add input {
    flex: 1;
    min-width: 0;
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    background: var(--surface);
    color: var(--text);
    font-family: var(--font);
    font-size: 12px;
    padding: 5px 7px;
  }
  .subtask-add button {
    border: 1px solid var(--border-strong);
    border-radius: var(--radius-md);
    background: var(--surface);
    color: var(--text);
    cursor: pointer;
    font-family: var(--font);
    font-size: 12px;
    padding: 5px 8px;
  }
  .subtask-add button:hover { background: var(--surface-2); }
  .task-edit-input {
    font-size: 14px;
    flex: 1;
    padding: 3px 6px;
    border: 1px solid var(--border-strong);
    border-radius: var(--radius-md);
    font-family: var(--font);
    background: var(--surface);
    color: var(--text);
  }
  .task-action-btn {
    padding: 4px;
    flex-shrink: 0;
    border: none;
    background: transparent;
    color: var(--text-3);
    cursor: pointer;
    border-radius: 6px;
    display: flex;
    align-items: center;
    transition: background 0.16s ease, color 0.16s ease, transform 0.16s ease;
  }
  .task-action-btn:hover { background: var(--border); color: var(--text); transform: translateY(-1px); }
  .project-item:active,
  .new-project-btn:active,
  .settings-menu button:active,
  .lane-header:active,
  .btn-sm:active:not(:disabled),
  .icon-btn:active,
  .task-action-btn:active,
  .add-task-row button:active {
    transform: translateY(1px);
  }
  .checkbox:active { transform: scale(0.96); }
  .today-controls {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    margin: 8px 0 16px;
    flex-wrap: wrap;
  }
  .today-date {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .today-date input {
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: 7px 9px;
    font-family: var(--font);
    color: var(--text);
    background: var(--surface);
    min-height: 32px;
  }
  .summary-grid {
    display: grid;
    grid-template-columns: repeat(5, minmax(0, 1fr));
    gap: 10px;
    margin: 10px 0 18px;
  }
  .summary-item {
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: 12px;
    background: var(--surface);
  }
  .summary-item .value {
    display: block;
    font-size: 22px;
    font-weight: 600;
    line-height: 1.15;
  }
  .summary-item .label {
    display: block;
    margin-top: 4px;
    color: var(--text-2);
    font-size: 11px;
  }
  .today-section {
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
    margin-bottom: 10px;
  }
  .today-task-row {
    cursor: default;
  }
  .project-chip {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    color: var(--text-2);
    font-size: 12px;
    margin-bottom: 1px;
  }
  .project-chip .dot {
    width: 7px;
    height: 7px;
  }
  .lane-select {
    max-width: 132px;
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    background: var(--surface);
    color: var(--text);
    font-family: var(--font);
    font-size: 12px;
    padding: 5px 7px;
    min-height: 32px;
  }
  .project-progress-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .project-progress-item {
    display: grid;
    grid-template-columns: minmax(110px, 1fr) 2fr auto;
    gap: 10px;
    align-items: center;
    font-size: 13px;
  }
  .project-progress-name {
    display: flex;
    align-items: center;
    gap: 7px;
    min-width: 0;
  }
  .project-progress-name span:last-child {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .add-task-row {
    display: flex;
    gap: 6px;
    margin-top: 8px;
  }
  .add-task-row input {
    flex: 1;
    font-size: 13px;
    padding: 7px 10px;
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    font-family: var(--font);
    background: var(--surface);
    color: var(--text);
  }
  .add-task-row input:focus, .new-project-form input:focus, .task-edit-input:focus, .project-title-input:focus {
    outline: none;
    border-color: var(--border-strong);
    box-shadow: 0 0 0 2px rgba(0,0,0,0.04);
  }
  .add-task-row button {
    padding: 7px 11px;
    border-radius: var(--radius-md);
    border: 1px solid var(--border-strong);
    background: var(--surface);
    cursor: pointer;
    font-family: var(--font);
    display: flex;
    align-items: center;
    transition: background 0.16s ease, transform 0.12s ease;
  }
  .add-task-row button:hover { background: var(--surface-2); }
  button:focus-visible,
  input:focus-visible,
  select:focus-visible,
  textarea:focus-visible {
    outline: 2px solid rgba(181, 71, 43, 0.35);
    outline-offset: 2px;
  }
  .new-project-form input {
    font-size: 13px;
    padding: 7px 10px;
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    font-family: var(--font);
    background: var(--surface);
    color: var(--text);
    width: 100%;
  }
  .new-project-form .row { display: flex; gap: 6px; }
  .new-project-form .row button { flex: 1; }
  .toast {
    font-size: 12px;
    color: var(--danger);
    margin-bottom: 14px;
    padding: 8px 12px;
    background: var(--danger-bg);
    border-radius: var(--radius-md);
  }
  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(35,34,32,0.28);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
    z-index: 30;
  }
  .modal {
    width: min(520px, 100%);
    max-height: min(720px, calc(100vh - 32px));
    overflow: auto;
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    box-shadow: 0 24px 80px rgba(35,34,32,0.22);
    padding: 18px;
  }
  .modal h2 {
    margin: 0 0 8px;
    font-size: 18px;
    font-weight: 600;
  }
  .modal p {
    margin: 0 0 12px;
    color: var(--text-2);
    font-size: 13px;
    line-height: 1.45;
  }
  .modal-summary {
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    overflow: hidden;
    margin: 12px 0;
  }
  .modal-summary div {
    display: flex;
    justify-content: space-between;
    gap: 14px;
    padding: 9px 11px;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }
  .modal-summary div:last-child { border-bottom: none; }
  .modal-summary span:first-child { color: var(--text-2); }
  .modal-summary span:last-child { font-weight: 500; text-align: right; overflow-wrap: anywhere; }
  .modal-error {
    background: var(--danger-bg);
    color: var(--danger);
    padding: 9px 11px;
    border-radius: var(--radius-md);
    font-size: 13px;
    margin: 10px 0 12px;
  }
  .modal-actions {
    display: flex;
    flex-wrap: wrap;
    justify-content: flex-end;
    gap: 8px;
    margin-top: 14px;
  }
  .modal-actions .btn-sm { padding: 7px 12px; }
  .task-form {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 10px;
    margin-top: 12px;
  }
  .task-form label {
    display: flex;
    flex-direction: column;
    gap: 5px;
    font-size: 12px;
    color: var(--text-2);
  }
  .task-form label.full { grid-column: 1 / -1; }
  .task-form input,
  .task-form select,
  .task-form textarea {
    width: 100%;
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    background: var(--surface);
    color: var(--text);
    font-family: var(--font);
    font-size: 13px;
    padding: 8px 9px;
  }
  .task-form textarea {
    min-height: 92px;
    resize: vertical;
  }
  .task-form input:focus,
  .task-form select:focus,
  .task-form textarea:focus {
    outline: none;
    border-color: var(--border-strong);
    box-shadow: 0 0 0 2px rgba(0,0,0,0.04);
  }
  .hidden-input { display: none; }
  @media (max-width: 640px) {
    body { padding: 12px; }
    .header { align-items: stretch; flex-direction: column; }
    .global-search { max-width: none; width: 100%; }
    .layout { flex-direction: column; }
    .sidebar { width: 100%; border-right: none; border-bottom: 1px solid var(--border); flex-direction: row; overflow-x: auto; }
    .sidebar-label { display: none; }
    .main { padding: 16px; }
    .project-item, .new-project-btn { min-height: 40px; }
    .icon-btn, .task-action-btn, .add-task-row button { min-width: 40px; min-height: 40px; justify-content: center; }
    .checkbox { width: 24px; height: 24px; }
    .lane-select { min-height: 40px; }
    .today-controls { align-items: stretch; flex-direction: column; }
    .today-date { width: 100%; flex-wrap: wrap; }
    .today-date input { flex: 1; min-width: 0; }
    .task-form { grid-template-columns: 1fr; }
    .summary-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .project-progress-item { grid-template-columns: 1fr; }
  }
  svg { display: block; }
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="header-title">
      <h1>Mis proyectos</h1>
      <span class="sub" id="saveStatus">Guardado localmente</span>
    </div>
    <div class="global-search">
      <input id="globalSearchInput" type="search" placeholder="Buscar tareas..." autocomplete="off">
    </div>
    <div class="header-tools" id="headerTools">
      <button class="icon-btn" data-action="toggle-settings" aria-label="Configuracion" title="Configuracion"></button>
    </div>
  </div>
  <div class="layout">
    <div class="sidebar" id="sidebar"></div>
    <div class="main" id="main"></div>
  </div>
  <input class="hidden-input" type="file" id="backupFileInput" accept=".json,application/json">
</div>
<div id="modalRoot"></div>

<script>
(function () {
  "use strict";

  var SCHEMA_VERSION = 2;
  var STORAGE_KEY = "projects-data-v1";
  var APP_NAME = "Focus";
  var LOCAL_BACKUP_PREFIX = "focus-local-backup-";
  var LOCAL_BACKUP_LIMIT = 10;
  var CORRUPT_BACKUP_PREFIX = "projects-data-corrupt-backup-";
  var SAVE_DELAY_MS = 300;
  var VALIDATION_LIMITS = {
    projectNameMin: 1,
    projectNameMax: 80,
    taskTextMin: 1,
    taskTextMax: 200,
    taskNotesMax: 2000
  };
  var LANE_NAMES = {
    urgente: "Urgente",
    diaria: "Diaria",
    semana: "Esta semana",
    algun_dia: "Alg\u00fan d\u00eda"
  };

  var LANES = [
    { key: "urgente", label: LANE_NAMES.urgente, accent: "#B5472B", icon: iconTriangle },
    { key: "diaria", label: LANE_NAMES.diaria, accent: "#9A7B1E", icon: iconSun },
    { key: "semana", label: LANE_NAMES.semana, accent: "#3C6E52", icon: iconCalendar },
    { key: "algun_dia", label: LANE_NAMES.algun_dia, accent: "#5B6470", icon: iconCloud }
  ];

  var PROJECT_COLORS = ["#B5472B", "#9A7B1E", "#3C6E52", "#3A5A8C", "#6B4C8A", "#5B6470"];
  var TASK_STATUSES = [
    { value: "pendiente", label: "Pendiente" },
    { value: "en_progreso", label: "En progreso" },
    { value: "bloqueada", label: "Bloqueada" },
    { value: "completada", label: "Completada" }
  ];
  var TASK_PRIORITIES = [
    { value: "baja", label: "Baja" },
    { value: "media", label: "Media" },
    { value: "alta", label: "Alta" }
  ];
  var TASK_TYPES = [
    { value: "trabajo", label: "Trabajo" },
    { value: "personal", label: "Personal" },
    { value: "reunion", label: "Reuni\u00f3n" },
    { value: "investigacion", label: "Investigaci\u00f3n" },
    { value: "otro", label: "Otro" }
  ];

  // ---------- icons (inline SVG, no external deps) ----------
  function svgWrap(inner, size, color) {
    return '<svg width="' + size + '" height="' + size + '" viewBox="0 0 24 24" fill="none" stroke="' + (color || "currentColor") + '" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' + inner + '</svg>';
  }
  function iconTriangle(size, color) {
    return svgWrap('<path d="M12 9v4"/><path d="M10.36 3.7a2 2 0 0 1 3.28 0l8.46 13.5a2 2 0 0 1-1.7 3.05H3.6a2 2 0 0 1-1.7-3.05Z"/><path d="M12 16h.01"/>', size, color);
  }
  function iconSun(size, color) {
    return svgWrap('<circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/>', size, color);
  }
  function iconCalendar(size, color) {
    return svgWrap('<rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4"/><path d="M8 2v4"/><path d="M3 10h18"/>', size, color);
  }
  function iconCloud(size, color) {
    return svgWrap('<path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9Z"/>', size, color);
  }
  function iconPlus(size, color) {
    return svgWrap('<path d="M5 12h14"/><path d="M12 5v14"/>', size, color);
  }
  function iconX(size, color) {
    return svgWrap('<path d="M18 6 6 18"/><path d="m6 6 12 12"/>', size, color);
  }
  function iconCheck(size, color) {
    return svgWrap('<path d="M20 6 9 17l-5-5"/>', size, color);
  }
  function iconTrash(size, color) {
    return svgWrap('<path d="M3 6h18"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><path d="M10 11v6"/><path d="M14 11v6"/>', size, color);
  }
  function iconPencil(size, color) {
    return svgWrap('<path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/>', size, color);
  }
  function iconChevronDown(size, color) {
    return svgWrap('<path d="m6 9 6 6 6-6"/>', size, color);
  }
  function iconChevronRight(size, color) {
    return svgWrap('<path d="m9 18 6-6-6-6"/>', size, color);
  }
  function iconGrip(size, color) {
    return svgWrap('<circle cx="9" cy="5" r="1"/><circle cx="9" cy="12" r="1"/><circle cx="9" cy="19" r="1"/><circle cx="15" cy="5" r="1"/><circle cx="15" cy="12" r="1"/><circle cx="15" cy="19" r="1"/>', size, color);
  }
  function iconGear(size, color) {
    return svgWrap('<path d="M12 15.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7Z"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06A1.65 1.65 0 0 0 15 19.4a1.65 1.65 0 0 0-1 .6 1.65 1.65 0 0 0-.4 1.1V21a2 2 0 1 1-4 0v-.09A1.65 1.65 0 0 0 8.6 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.6 15a1.65 1.65 0 0 0-1-.6 1.65 1.65 0 0 0-1.1-.4H2a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.6a1.65 1.65 0 0 0 .6-1V3a2 2 0 1 1 4 0v.09A1.65 1.65 0 0 0 15 4.6a1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9c.14.33.34.61.6.8.3.2.65.31 1 .3H22a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51.9Z"/>', size, color);
  }
  function iconDownload(size, color) {
    return svgWrap('<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M7 10l5 5 5-5"/><path d="M12 15V3"/>', size, color);
  }
  function iconUpload(size, color) {
    return svgWrap('<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M17 8l-5-5-5 5"/><path d="M12 3v12"/>', size, color);
  }
  function iconArchive(size, color) {
    return svgWrap('<rect x="3" y="4" width="18" height="4" rx="1"/><path d="M5 8v11a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8"/><path d="M10 12h4"/>', size, color);
  }
  function iconRotate(size, color) {
    return svgWrap('<path d="M3 12a9 9 0 1 0 3-6.7"/><path d="M3 3v6h6"/>', size, color);
  }
  function iconInfo(size, color) {
    return svgWrap('<circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/>', size, color);
  }
  function iconNote(size, color) {
    return svgWrap('<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8Z"/><path d="M14 2v6h6"/><path d="M8 13h8"/><path d="M8 17h5"/>', size, color);
  }

  // ---------- state ----------
  var state = {
    projects: [],
    activeProjectId: null,
    view: "project",
    searchQuery: "",
    todayDate: null,
    collapsedTodaySections: {},
    collapsedLanes: {},
    expandedNotes: {},
    editingTask: null,
    editingProjectName: false,
    confirmDeleteProject: false,
    newProjectOpen: false,
    storageWarning: null,
    settingsOpen: false,
    modal: null,
    pendingImport: null,
    taskForm: null
  };

  function generateId() {
    return Math.random().toString(36).slice(2, 10) + Date.now().toString(36);
  }

  function deepClone(value) {
    return JSON.parse(JSON.stringify(value));
  }

  function sanitizeText(value, maxLength) {
    var text = String(value || "").trim();
    if (typeof maxLength === "number" && maxLength > 0) {
      text = text.slice(0, maxLength);
    }
    return text;
  }

  function showSaveStatus(message) {
    var statusEl = document.getElementById("saveStatus");
    if (statusEl) statusEl.textContent = message;
  }

  function emptyProject(name, color) {
    return { id: generateId(), name: name, color: color, createdAt: Date.now(), tasks: [] };
  }

  function escapeHtml(str) {
    var div = document.createElement("div");
    div.textContent = str;
    return div.innerHTML;
  }

  // ---------- persistence ----------
  var saveTimer = null;

  function getStorageData() {
    var raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return { data: null, corrupt: false };

    try {
      return { data: JSON.parse(raw), corrupt: false };
    } catch (e) {
      var backupKey = CORRUPT_BACKUP_PREFIX + Date.now();
      try {
        localStorage.setItem(backupKey, raw);
      } catch (backupError) {
        console.error("No se pudo guardar backup de datos corruptos:", backupError);
      }
      console.error("JSON inv\u00e1lido en localStorage:", e);
      return { data: null, corrupt: true, backupKey: backupKey };
    }
  }

  function setStorageData(data) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  }

  function getPersistableData() {
    return {
      schemaVersion: SCHEMA_VERSION,
      projects: deepClone(state.projects),
      activeProjectId: state.activeProjectId
    };
  }

  function normalizeTimestamp(value) {
    var parsed = Date.parse(value);
    return isNaN(parsed) ? null : new Date(parsed).toISOString();
  }

  function dateToInputValue(date) {
    var d = date || new Date();
    var month = String(d.getMonth() + 1).padStart(2, "0");
    var day = String(d.getDate()).padStart(2, "0");
    return d.getFullYear() + "-" + month + "-" + day;
  }

  function optionExists(options, value) {
    return options.some(function (item) { return item.value === value; });
  }

  function normalizeStatus(status, done) {
    if (status === "completada") return "completada";
    if (done) return "completada";
    if (status === "bloqueada" || status === "en_progreso") return status;
    return "pendiente";
  }

  function normalizePriority(priority) {
    return optionExists(TASK_PRIORITIES, priority) ? priority : "media";
  }

  function normalizeTaskType(taskType) {
    return optionExists(TASK_TYPES, taskType) ? taskType : "otro";
  }

  function normalizeDateOnly(value) {
    if (value === null || value === undefined || value === "") return null;
    if (typeof value !== "string") return null;
    var match = value.match(/^(\d{4})-(\d{2})-(\d{2})/);
    if (!match) return null;
    var d = new Date(match[1] + "-" + match[2] + "-" + match[3] + "T00:00:00");
    if (isNaN(d.getTime())) return null;
    if (d.getFullYear() !== Number(match[1]) || d.getMonth() + 1 !== Number(match[2]) || d.getDate() !== Number(match[3])) return null;
    return match[1] + "-" + match[2] + "-" + match[3];
  }

  function isTaskCompleted(task) {
    return task.status === "completada" || task.done === true;
  }

  function isTaskDeleted(task) {
    return !!task.deletedAt;
  }

  function todayDateOnly() {
    var d = new Date();
    d.setHours(0, 0, 0, 0);
    return d;
  }

  function parseDateOnly(value) {
    var normalized = normalizeDateOnly(value);
    if (!normalized) return null;
    var d = new Date(normalized + "T00:00:00");
    return isNaN(d.getTime()) ? null : d;
  }

  function daysUntil(value) {
    var d = parseDateOnly(value);
    if (!d) return null;
    return Math.round((d.getTime() - todayDateOnly().getTime()) / 86400000);
  }

  function dateOnlyFromTimestamp(value) {
    if (!value) return null;
    var d = new Date(value);
    if (isNaN(d.getTime())) return null;
    return dateToInputValue(d);
  }

  function compareDateOnly(a, b) {
    if (!a && !b) return 0;
    if (!a) return 1;
    if (!b) return -1;
    return a.localeCompare(b);
  }

  function normalizeLane(value) {
    for (var i = 0; i < LANES.length; i++) {
      if (LANES[i].key === value) return value;
    }
    return LANES[0].key;
  }

  function getTaskPosition(projectTasks, lane, task, fallbackIndex) {
    if (typeof task.position === "number" && task.position >= 0) return task.position;
    var position = 0;
    for (var i = 0; i < fallbackIndex; i++) {
      var previous = projectTasks[i];
      if (previous && normalizeLane(previous.lane) === lane && !previous.deletedAt) position++;
    }
    return position;
  }

  function normalizeSubtasks(subtasks) {
    if (!Array.isArray(subtasks)) return [];
    return subtasks.filter(function (item) {
      return item && typeof item === "object" && !Array.isArray(item);
    }).map(function (item) {
      var now = Date.now();
      return {
        id: sanitizeText(item.id || generateId(), 120) || generateId(),
        text: sanitizeText(item.text || "", VALIDATION_LIMITS.taskTextMax),
        done: item.done === true,
        createdAt: typeof item.createdAt === "number" ? item.createdAt : now,
        updatedAt: typeof item.updatedAt === "number" ? item.updatedAt : now
      };
    }).filter(function (item) {
      return item.text.length >= VALIDATION_LIMITS.taskTextMin;
    });
  }

  function normalizeTask(task, taskIndex, projectTasks) {
    if (!task || typeof task !== "object" || Array.isArray(task)) {
      throw new Error("Hay una tarea con formato invalido.");
    }
    var createdAt = typeof task.createdAt === "number" ? task.createdAt : Date.now();
    var done = !!task.done;
    var status = normalizeStatus(task.status, done);
    if (status === "completada") done = true;
    if (status === "bloqueada" || status === "en_progreso") done = false;
    var lane = normalizeLane(task.lane);
    var estimate = task.estimateMinutes;
    if (estimate === "" || estimate === undefined || estimate === null || isNaN(Number(estimate)) || Number(estimate) < 0) {
      estimate = null;
    } else {
      estimate = Math.round(Number(estimate));
    }
    var completedAt = task.completedAt || null;
    if (done && !completedAt) completedAt = createdAt;

    return {
      id: sanitizeText(task.id || generateId(), 120) || generateId(),
      text: sanitizeText(task.text || task.title || ("Tarea " + (taskIndex + 1)), VALIDATION_LIMITS.taskTextMax) || ("Tarea " + (taskIndex + 1)),
      lane: lane,
      done: done,
      createdAt: createdAt,
      status: status,
      priority: normalizePriority(task.priority),
      dueDate: normalizeDateOnly(task.dueDate),
      scheduledDate: normalizeDateOnly(task.scheduledDate),
      estimateMinutes: estimate,
      taskType: normalizeTaskType(task.taskType),
      notes: sanitizeText(task.notes || "", VALIDATION_LIMITS.taskNotesMax),
      subtasks: normalizeSubtasks(task.subtasks),
      externalUrl: typeof task.externalUrl === "string" ? task.externalUrl.trim() : "",
      position: getTaskPosition(projectTasks, lane, task, taskIndex),
      updatedAt: typeof task.updatedAt === "number" ? task.updatedAt : createdAt,
      completedAt: completedAt,
      deletedAt: task.deletedAt || null
    };
  }

  function normalizeProjects(projects) {
    if (!Array.isArray(projects)) throw new Error("La copia no contiene una lista de proyectos.");

    return projects.map(function (project, projectIndex) {
      if (!project || typeof project !== "object" || Array.isArray(project)) {
        throw new Error("Hay un proyecto con formato invalido.");
      }
      var name = sanitizeText(project.name || ("Proyecto " + (projectIndex + 1)), VALIDATION_LIMITS.projectNameMax);
      var color = typeof project.color === "string" && project.color ? project.color : PROJECT_COLORS[projectIndex % PROJECT_COLORS.length];
      var tasks = Array.isArray(project.tasks) ? project.tasks : [];

      return {
        id: sanitizeText(project.id || generateId(), 120) || generateId(),
        name: name || ("Proyecto " + (projectIndex + 1)),
        color: color,
        createdAt: typeof project.createdAt === "number" ? project.createdAt : Date.now(),
        tasks: tasks.map(function (task, taskIndex) { return normalizeTask(task, taskIndex, tasks); })
      };
    });
  }

  function migrateData(data) {
    if (!data || typeof data !== "object" || Array.isArray(data)) {
      throw new Error("El archivo no contiene un objeto de datos valido.");
    }

    var source = data.projects && Array.isArray(data.projects) ? data : (data.data && data.data.projects ? data.data : data);
    var version = source.schemaVersion || data.schemaVersion || null;
    if (version && Number(version) > SCHEMA_VERSION) {
      throw new Error("La copia usa una version de esquema mas nueva que esta app.");
    }

    var projects = normalizeProjects(source.projects);
    var activeProjectId = source.activeProjectId || (projects[0] ? projects[0].id : null);
    var activeExists = projects.some(function (p) { return p.id === activeProjectId; });

    return {
      schemaVersion: SCHEMA_VERSION,
      projects: projects,
      activeProjectId: activeExists ? activeProjectId : (projects[0] ? projects[0].id : null),
      migratedFromSchemaVersion: version || "legacy"
    };
  }

  function makeBackupPayload(data, metadata) {
    return {
      appName: APP_NAME,
      schemaVersion: SCHEMA_VERSION,
      exportedAt: new Date().toISOString(),
      projects: deepClone(data.projects || []),
      activeProjectId: data.activeProjectId || null,
      metadata: metadata || {}
    };
  }

  function listLocalBackups() {
    var backups = [];
    for (var i = 0; i < localStorage.length; i++) {
      var key = localStorage.key(i);
      if (key && key.indexOf(LOCAL_BACKUP_PREFIX) === 0) {
        try {
          var parsed = JSON.parse(localStorage.getItem(key));
          backups.push({ key: key, payload: parsed, exportedAt: parsed.exportedAt || key.replace(LOCAL_BACKUP_PREFIX, "") });
        } catch (e) {
          backups.push({ key: key, payload: null, exportedAt: key.replace(LOCAL_BACKUP_PREFIX, "") });
        }
      }
    }
    backups.sort(function (a, b) {
      return String(b.exportedAt).localeCompare(String(a.exportedAt));
    });
    return backups;
  }

  function pruneLocalBackups() {
    listLocalBackups().slice(LOCAL_BACKUP_LIMIT).forEach(function (backup) {
      localStorage.removeItem(backup.key);
    });
  }

  function createLocalBackup(reason) {
    var payload = makeBackupPayload(getPersistableData(), { type: "local-backup", reason: reason || "manual" });
    var key = LOCAL_BACKUP_PREFIX + payload.exportedAt + "-" + generateId();
    localStorage.setItem(key, JSON.stringify(payload));
    pruneLocalBackups();
    return key;
  }

  function saveImmediately(data) {
    if (saveTimer) clearTimeout(saveTimer);
    setStorageData({
      schemaVersion: SCHEMA_VERSION,
      projects: data.projects,
      activeProjectId: data.activeProjectId
    });
    showSaveStatus("Guardado localmente");
  }

  function getInitialProject() {
    return emptyProject("Mi primer proyecto", PROJECT_COLORS[0]);
  }

  function showStorageWarning(message) {
    state.storageWarning = message;
    renderStorageWarning();
  }

  function renderStorageWarning() {
    var app = document.getElementById("app");
    var existing = document.getElementById("storageWarning");
    if (existing) existing.remove();
    if (!app || !state.storageWarning) return;

    var warning = document.createElement("div");
    warning.className = "toast";
    warning.id = "storageWarning";
    warning.textContent = state.storageWarning;
    app.insertBefore(warning, app.querySelector(".layout"));
  }

  function load() {
    var storage = getStorageData();
    if (storage.data) {
      var migrated;
      try {
        migrated = migrateData(storage.data);
      } catch (e) {
        state.storageWarning = "No se pudieron migrar los datos guardados. Se inicio una version segura.";
        console.error("Error migrando datos:", e);
        migrated = null;
      }

      if (migrated) {
        if (!storage.data.schemaVersion || storage.data.schemaVersion !== SCHEMA_VERSION) {
          try {
            state.projects = migrated.projects;
            state.activeProjectId = migrated.activeProjectId;
            createLocalBackup("before-migration");
            saveImmediately(migrated);
          } catch (backupError) {
            console.error("No se pudo guardar respaldo previo a migracion:", backupError);
          }
        }
        state.projects = migrated.projects;
        state.activeProjectId = migrated.activeProjectId;
      } else {
        state.projects = [];
        state.activeProjectId = null;
      }

      if (state.projects.length === 0) {
        var p = getInitialProject();
        state.projects = [p];
        state.activeProjectId = p.id;
        saveImmediately(getPersistableData());
      }
      return;
    }

    var starter = getInitialProject();
    state.projects = [starter];
    state.activeProjectId = starter.id;

    if (storage.corrupt) {
      state.storageWarning = "No se pudieron leer los datos guardados. Se cre\u00f3 una copia de seguridad y se inici\u00f3 una versi\u00f3n segura.";
      showSaveStatus("Datos seguros sin guardar");
    }
  }

  function save() {
    showSaveStatus("Guardando...");
    if (saveTimer) clearTimeout(saveTimer);
    saveTimer = setTimeout(function () {
      try {
        setStorageData(getPersistableData());
        showSaveStatus("Guardado localmente");
      } catch (e) {
        showSaveStatus("Error al guardar");
        console.error("Error guardando:", e);
      }
    }, SAVE_DELAY_MS);
  }

  function getActiveProject() {
    var found = null;
    for (var i = 0; i < state.projects.length; i++) {
      if (state.projects[i].id === state.activeProjectId) { found = state.projects[i]; break; }
    }
    return found || state.projects[0] || null;
  }

  function getProjectById(projectId) {
    for (var i = 0; i < state.projects.length; i++) {
      if (state.projects[i].id === projectId) return state.projects[i];
    }
    return null;
  }

  function updateProject(id, fn) {
    for (var i = 0; i < state.projects.length; i++) {
      if (state.projects[i].id === id) {
        state.projects[i] = fn(deepClone(state.projects[i]));
        break;
      }
    }
    save();
    render();
  }

  function updateTaskInProject(projectId, taskId, fn) {
    updateProject(projectId, function (p) {
      p.tasks = p.tasks.map(function (t) {
        if (t.id === taskId) return fn(t, p);
        return t;
      });
      return p;
    });
  }

  // ---------- backup and import ----------
  function countTasks(projects) {
    return projects.reduce(function (sum, project) {
      return sum + (Array.isArray(project.tasks) ? project.tasks.filter(function (task) { return !isTaskDeleted(task); }).length : 0);
    }, 0);
  }

  function formatDateTime(value) {
    var parsed = Date.parse(value);
    if (isNaN(parsed)) return "Sin fecha";
    return new Date(parsed).toLocaleString("es-AR");
  }

  function buildBackupFileName() {
    var d = new Date();
    function pad(n) { return String(n).padStart(2, "0"); }
    return "focus-backup-" + d.getFullYear() + "-" + pad(d.getMonth() + 1) + "-" + pad(d.getDate()) + "-" + pad(d.getHours()) + "-" + pad(d.getMinutes()) + ".json";
  }

  function triggerDownload(filename, content) {
    var blob = new Blob([content], { type: "application/json" });
    var url = URL.createObjectURL(blob);
    var link = document.createElement("a");
    link.href = url;
    link.download = filename;
    document.body.appendChild(link);
    link.click();
    link.remove();
    URL.revokeObjectURL(url);
  }

  function exportBackupJson() {
    try {
      var payload = makeBackupPayload(getPersistableData(), {
        projectCount: state.projects.length,
        taskCount: countTasks(state.projects)
      });
      var content = JSON.stringify(payload, null, 2);
      JSON.parse(content);
      triggerDownload(buildBackupFileName(), content);
      state.settingsOpen = false;
      showSaveStatus("Exportaci\u00f3n completada");
      renderHeader();
    } catch (e) {
      showSaveStatus("Error al exportar");
      openMessageModal("No se pudo exportar", "La app no pudo construir un JSON valido para descargar.", e.message);
    }
  }

  function summarizeBackup(data) {
    return {
      projectCount: data.projects.length,
      taskCount: countTasks(data.projects),
      exportedAt: data.exportedAt || data.metadata && data.metadata.exportedAt || null,
      schemaVersion: data.schemaVersion || SCHEMA_VERSION
    };
  }

  function validateImportedBackup(rawData) {
    var migrated = migrateData(rawData);
    return {
      data: {
        schemaVersion: SCHEMA_VERSION,
        projects: migrated.projects,
        activeProjectId: migrated.activeProjectId,
        exportedAt: normalizeTimestamp(rawData.exportedAt) || null,
        originalSchemaVersion: rawData.schemaVersion || migrated.migratedFromSchemaVersion
      },
      summary: summarizeBackup({
        schemaVersion: rawData.schemaVersion || migrated.migratedFromSchemaVersion,
        exportedAt: rawData.exportedAt || null,
        projects: migrated.projects
      })
    };
  }

  function prepareImportFromFile(file) {
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function () {
      try {
        var parsed = JSON.parse(String(reader.result || ""));
        var imported = validateImportedBackup(parsed);
        state.pendingImport = imported;
        state.settingsOpen = false;
        state.modal = { type: "import-confirm" };
        render();
      } catch (e) {
        state.pendingImport = null;
        state.settingsOpen = false;
        showSaveStatus("Error al importar");
        openMessageModal("Error al importar", "El archivo no se importo porque no es un respaldo valido de Focus.", e.message);
      }
    };
    reader.onerror = function () {
      showSaveStatus("Error al importar");
      openMessageModal("Error al importar", "No se pudo leer el archivo seleccionado.", "");
    };
    reader.readAsText(file);
  }

  function remapImportedIds(projects) {
    var existingProjectIds = {};
    state.projects.forEach(function (p) { existingProjectIds[p.id] = true; });

    return projects.map(function (project) {
      var copy = deepClone(project);
      if (existingProjectIds[copy.id]) copy.id = generateId();
      existingProjectIds[copy.id] = true;
      var taskIds = {};
      copy.tasks = copy.tasks.map(function (task) {
        var taskCopy = deepClone(task);
        if (taskIds[taskCopy.id]) taskCopy.id = generateId();
        taskIds[taskCopy.id] = true;
        return taskCopy;
      });
      return copy;
    });
  }

  function applyPendingImport(mode) {
    if (!state.pendingImport) return;
    try {
      createLocalBackup("before-import");
      var imported = state.pendingImport.data;
      if (mode === "merge") {
        var incoming = remapImportedIds(imported.projects);
        var activeStillExists = state.projects.some(function (p) { return p.id === state.activeProjectId; });
        state.projects = state.projects.concat(incoming);
        state.activeProjectId = activeStillExists ? state.activeProjectId : (state.projects[0] ? state.projects[0].id : null);
      } else {
        state.projects = deepClone(imported.projects);
        state.activeProjectId = imported.activeProjectId || (state.projects[0] ? state.projects[0].id : null);
      }
      state.pendingImport = null;
      state.modal = null;
      saveImmediately(getPersistableData());
      showSaveStatus("Importaci\u00f3n completada");
      render();
    } catch (e) {
      showSaveStatus("Error al importar");
      openMessageModal("Error al importar", "No se modificaron los datos actuales.", e.message);
    }
  }

  function restoreLatestLocalBackup() {
    var latest = listLocalBackups()[0];
    if (!latest || !latest.payload) {
      openMessageModal("Sin respaldos locales", "Todavia no hay respaldos locales disponibles para restaurar.", "");
      return;
    }
    try {
      var restored = validateImportedBackup(latest.payload);
      state.pendingImport = restored;
      state.modal = { type: "restore-confirm", backupKey: latest.key };
      state.settingsOpen = false;
      render();
    } catch (e) {
      openMessageModal("Respaldo local invalido", "El ultimo respaldo local no pudo leerse.", e.message);
    }
  }

  function applyPendingRestore() {
    if (!state.pendingImport) return;
    try {
      createLocalBackup("before-restore");
      var restored = state.pendingImport.data;
      state.projects = deepClone(restored.projects);
      state.activeProjectId = restored.activeProjectId || (state.projects[0] ? state.projects[0].id : null);
      state.pendingImport = null;
      state.modal = null;
      saveImmediately(getPersistableData());
      showSaveStatus("Importaci\u00f3n completada");
      render();
    } catch (e) {
      showSaveStatus("Error al importar");
      openMessageModal("Error al restaurar", "No se modificaron los datos actuales.", e.message);
    }
  }

  function openStorageInfo() {
    state.settingsOpen = false;
    state.modal = { type: "storage-info" };
    render();
  }

  function openMessageModal(title, message, detail) {
    state.settingsOpen = false;
    state.modal = { type: "message", title: title, message: message, detail: detail || "" };
    render();
  }

  // ---------- actions ----------
  function addProject(name) {
    var trimmed = sanitizeText(name, VALIDATION_LIMITS.projectNameMax);
    if (trimmed.length < VALIDATION_LIMITS.projectNameMin) return;
    var color = PROJECT_COLORS[state.projects.length % PROJECT_COLORS.length];
    var p = emptyProject(trimmed, color);
    state.projects.push(p);
    state.activeProjectId = p.id;
    state.view = "project";
    state.newProjectOpen = false;
    save();
    render();
  }

  function deleteProject(id) {
    state.projects = state.projects.filter(function (p) { return p.id !== id; });
    if (state.activeProjectId === id) {
      state.activeProjectId = state.projects[0] ? state.projects[0].id : null;
    }
    state.confirmDeleteProject = false;
    save();
    render();
  }

  function nextTaskPosition(tasks, lane) {
    var laneTasks = tasks.filter(function (task) { return task.lane === lane && !isTaskDeleted(task); });
    if (laneTasks.length === 0) return 0;
    return Math.max.apply(null, laneTasks.map(function (task) { return typeof task.position === "number" ? task.position : 0; })) + 1;
  }

  function newTask(text, lane) {
    var now = Date.now();
    return {
      id: generateId(),
      text: text,
      lane: lane,
      done: false,
      createdAt: now,
      status: "pendiente",
      priority: "media",
      dueDate: null,
      scheduledDate: null,
      estimateMinutes: null,
      taskType: "otro",
      notes: "",
      subtasks: [],
      externalUrl: "",
      position: 0,
      updatedAt: now,
      completedAt: null,
      deletedAt: null
    };
  }

  function addTask(lane, text) {
    var trimmed = sanitizeText(text, VALIDATION_LIMITS.taskTextMax);
    var active = getActiveProject();
    if (trimmed.length < VALIDATION_LIMITS.taskTextMin || !active) return;
    updateProject(active.id, function (p) {
      var task = newTask(trimmed, lane);
      task.position = nextTaskPosition(p.tasks, lane);
      p.tasks.push(task);
      return p;
    });
    var input = document.querySelector('.add-task-row input[data-lane="' + lane + '"]');
    if (input) input.value = "";
  }

  function toggleTask(taskId, projectId) {
    var project = projectId ? getProjectById(projectId) : getActiveProject();
    if (!project) return;
    updateTaskInProject(project.id, taskId, function (t) {
      var now = Date.now();
      var nextDone = !isTaskCompleted(t);
      t.done = nextDone;
      t.status = nextDone ? "completada" : "pendiente";
      t.completedAt = nextDone ? (t.completedAt || now) : null;
      t.updatedAt = now;
      return t;
    });
  }

  function addSubtask(taskId, text, projectId) {
    var project = projectId ? getProjectById(projectId) : getActiveProject();
    var trimmed = sanitizeText(text, VALIDATION_LIMITS.taskTextMax);
    if (!project || trimmed.length < VALIDATION_LIMITS.taskTextMin) return;
    updateTaskInProject(project.id, taskId, function (t) {
      var now = Date.now();
      t.subtasks = normalizeSubtasks(t.subtasks);
      t.subtasks.push({
        id: generateId(),
        text: trimmed,
        done: false,
        createdAt: now,
        updatedAt: now
      });
      t.updatedAt = now;
      return t;
    });
  }

  function toggleSubtask(taskId, subtaskId, projectId) {
    var project = projectId ? getProjectById(projectId) : getActiveProject();
    if (!project) return;
    updateTaskInProject(project.id, taskId, function (t) {
      var now = Date.now();
      t.subtasks = normalizeSubtasks(t.subtasks).map(function (item) {
        if (item.id === subtaskId) {
          item.done = !item.done;
          item.updatedAt = now;
        }
        return item;
      });
      t.updatedAt = now;
      return t;
    });
  }

  function deleteSubtask(taskId, subtaskId, projectId) {
    var project = projectId ? getProjectById(projectId) : getActiveProject();
    if (!project) return;
    updateTaskInProject(project.id, taskId, function (t) {
      t.subtasks = normalizeSubtasks(t.subtasks).filter(function (item) { return item.id !== subtaskId; });
      t.updatedAt = Date.now();
      return t;
    });
  }

  function deleteTask(taskId) {
    var active = getActiveProject();
    if (!active) return;
    updateProject(active.id, function (p) {
      p.tasks = p.tasks.map(function (t) {
        if (t.id === taskId) {
          t.deletedAt = Date.now();
          t.updatedAt = t.deletedAt;
        }
        return t;
      });
      return p;
    });
  }

  function moveTask(taskId, newLane, projectId) {
    var project = projectId ? getProjectById(projectId) : getActiveProject();
    if (!project) return;
    updateProject(project.id, function (p) {
      p.tasks = p.tasks.map(function (t) {
        if (t.id === taskId) {
          t.lane = newLane;
          t.position = nextTaskPosition(p.tasks, newLane);
          t.updatedAt = Date.now();
        }
        return t;
      });
      return p;
    });
  }

  function saveTaskEdit(taskId, text) {
    var trimmed = sanitizeText(text, VALIDATION_LIMITS.taskTextMax);
    var active = getActiveProject();
    state.editingTask = null;
    if (trimmed.length < VALIDATION_LIMITS.taskTextMin || !active) { render(); return; }
    updateProject(active.id, function (p) {
      p.tasks = p.tasks.map(function (t) {
        if (t.id === taskId) {
          t.text = trimmed;
          t.updatedAt = Date.now();
        }
        return t;
      });
      return p;
    });
  }

  function findTask(taskId, projectId) {
    var project = projectId ? getProjectById(projectId) : getActiveProject();
    if (!project) return null;
    for (var i = 0; i < project.tasks.length; i++) {
      if (project.tasks[i].id === taskId && !isTaskDeleted(project.tasks[i])) return project.tasks[i];
    }
    return null;
  }

  function openTaskForm(taskId, projectId) {
    var project = projectId ? getProjectById(projectId) : getActiveProject();
    var task = project ? findTask(taskId, project.id) : null;
    if (!task) return;
    state.taskForm = { mode: "edit", taskId: taskId, projectId: project.id, error: null };
    state.modal = { type: "task-form" };
    render();
  }

  function openCreateTaskForm(lane) {
    state.taskForm = { mode: "create", lane: normalizeLane(lane), error: null };
    state.modal = { type: "task-form" };
    render();
  }

  function isValidUrl(value) {
    if (!value) return true;
    try {
      var parsed = new URL(value);
      return parsed.protocol === "http:" || parsed.protocol === "https:";
    } catch (e) {
      return false;
    }
  }

  function readTaskForm() {
    var title = sanitizeText((document.getElementById("taskFormTitle") || {}).value || "", VALIDATION_LIMITS.taskTextMax);
    var lane = normalizeLane((document.getElementById("taskFormLane") || {}).value);
    var status = normalizeStatus((document.getElementById("taskFormStatus") || {}).value, false);
    var priority = normalizePriority((document.getElementById("taskFormPriority") || {}).value);
    var dueDateValue = (document.getElementById("taskFormDueDate") || {}).value || "";
    var scheduledDateValue = (document.getElementById("taskFormScheduledDate") || {}).value || "";
    var taskType = normalizeTaskType((document.getElementById("taskFormType") || {}).value);
    var estimateValue = (document.getElementById("taskFormEstimate") || {}).value;
    var notes = String((document.getElementById("taskFormNotes") || {}).value || "").slice(0, VALIDATION_LIMITS.taskNotesMax);
    var externalUrl = String((document.getElementById("taskFormUrl") || {}).value || "").trim();

    if (title.length < VALIDATION_LIMITS.taskTextMin) throw new Error("El t\u00edtulo es obligatorio.");
    if (title.length > VALIDATION_LIMITS.taskTextMax) throw new Error("El t\u00edtulo no puede superar 200 caracteres.");
    if (notes.length > VALIDATION_LIMITS.taskNotesMax) throw new Error("Las notas no pueden superar 2.000 caracteres.");
    if (dueDateValue && !normalizeDateOnly(dueDateValue)) throw new Error("La fecha l\u00edmite no es v\u00e1lida.");
    if (scheduledDateValue && !normalizeDateOnly(scheduledDateValue)) throw new Error("La fecha planificada no es v\u00e1lida.");
    if (estimateValue !== "" && (isNaN(Number(estimateValue)) || Number(estimateValue) < 0)) throw new Error("La estimaci\u00f3n debe ser mayor o igual a cero.");
    if (!isValidUrl(externalUrl)) throw new Error("El enlace externo debe ser una URL http(s) v\u00e1lida o estar vac\u00edo.");
    if (status === "completada") {
      // Estado completado gana sobre estados operativos.
    }

    return {
      text: title,
      lane: lane,
      status: status,
      priority: priority,
      dueDate: normalizeDateOnly(dueDateValue),
      scheduledDate: normalizeDateOnly(scheduledDateValue),
      taskType: taskType,
      estimateMinutes: estimateValue === "" ? null : Math.round(Number(estimateValue)),
      notes: notes,
      externalUrl: externalUrl
    };
  }

  function saveTaskForm() {
    if (!state.taskForm) return;
    var active = state.taskForm.projectId ? getProjectById(state.taskForm.projectId) : getActiveProject();
    if (!active) return;
    var taskId = state.taskForm.taskId;
    var mode = state.taskForm.mode;
    var values;
    try {
      values = readTaskForm();
    } catch (e) {
      state.taskForm.error = e.message;
      render();
      return;
    }
    state.taskForm = null;
    state.modal = null;
    updateProject(active.id, function (p) {
      if (mode === "create") {
        var created = newTask(values.text, values.lane);
        created.status = values.status;
        created.done = values.status === "completada";
        created.completedAt = created.done ? Date.now() : null;
        created.priority = values.priority;
        created.dueDate = values.dueDate;
        created.scheduledDate = values.scheduledDate;
        created.taskType = values.taskType;
        created.estimateMinutes = values.estimateMinutes;
        created.notes = values.notes;
        created.externalUrl = values.externalUrl;
        created.position = nextTaskPosition(p.tasks, values.lane);
        created.updatedAt = Date.now();
        p.tasks.push(created);
        return p;
      }
      p.tasks = p.tasks.map(function (t) {
        if (t.id !== taskId) return t;
        var wasDone = isTaskCompleted(t);
        var now = Date.now();
        t.text = values.text;
        t.lane = values.lane;
        t.status = values.status === "completada" ? "completada" : values.status;
        t.done = t.status === "completada";
        t.completedAt = t.done ? (wasDone ? t.completedAt || now : now) : null;
        t.priority = values.priority;
        t.dueDate = values.dueDate;
        t.scheduledDate = values.scheduledDate;
        t.taskType = values.taskType;
        t.estimateMinutes = values.estimateMinutes;
        t.notes = values.notes;
        t.externalUrl = values.externalUrl;
        t.updatedAt = now;
        return t;
      });
      return p;
    });
  }

  function renameProject(id, name) {
    var trimmed = sanitizeText(name, VALIDATION_LIMITS.projectNameMax);
    state.editingProjectName = false;
    if (trimmed.length < VALIDATION_LIMITS.projectNameMin) { render(); return; }
    updateProject(id, function (p) { p.name = trimmed; return p; });
  }

  // ---------- render ----------
  function render() {
    renderHeader();
    renderSidebar();
    renderMain();
    renderStorageWarning();
    renderModal();
  }

  function renderHeader() {
    var searchInput = document.getElementById("globalSearchInput");
    if (searchInput && searchInput.value !== state.searchQuery) searchInput.value = state.searchQuery;
    var tools = document.getElementById("headerTools");
    if (!tools) return;
    var html = '<button class="icon-btn" data-action="toggle-settings" aria-label="Configuracion" title="Configuracion">' + iconGear(17) + '</button>';

    if (state.settingsOpen) {
      html += '<div class="settings-menu">' +
        '<button data-action="export-backup">' + iconDownload(15) + '<span>Exportar respaldo JSON</span></button>' +
        '<button data-action="open-import">' + iconUpload(15) + '<span>Importar respaldo JSON</span></button>' +
        '<button data-action="create-local-backup">' + iconArchive(15) + '<span>Crear respaldo local</span></button>' +
        '<button data-action="restore-local-backup">' + iconRotate(15) + '<span>Restaurar \u00faltimo respaldo local</span></button>' +
        '<button data-action="storage-info">' + iconInfo(15) + '<span>Ver informaci\u00f3n de almacenamiento</span></button>' +
        '</div>';
    }
    tools.innerHTML = html;
  }

  function optionLabel(options, value) {
    for (var i = 0; i < options.length; i++) {
      if (options[i].value === value) return options[i].label;
    }
    return value || "";
  }

  function formatDateOnly(value) {
    var d = parseDateOnly(value);
    if (!d) return "";
    return d.toLocaleDateString("es-AR", { day: "2-digit", month: "2-digit" });
  }

  function taskDueKind(task, referenceDate) {
    if (!task.dueDate || isTaskCompleted(task)) return "";
    var ref = referenceDate || dateToInputValue(todayDateOnly());
    if (task.dueDate < ref) return "overdue";
    if (task.dueDate === ref) return "due-today";
    var refDate = parseDateOnly(ref);
    var dueDate = parseDateOnly(task.dueDate);
    if (!refDate || !dueDate) return "";
    var diff = Math.round((dueDate.getTime() - refDate.getTime()) / 86400000);
    if (diff === 1) return "due-tomorrow";
    return "";
  }

  function taskVisualClasses(task, referenceDate) {
    var classes = [];
    var dueKind = taskDueKind(task, referenceDate);
    if (dueKind) classes.push(dueKind);
    if (task.status === "bloqueada" && !isTaskCompleted(task)) classes.push("blocked");
    if (task.priority === "alta" && !isTaskCompleted(task)) classes.push("high-priority");
    if (isTaskCompleted(task)) classes.push("completed");
    return classes.join(" ");
  }

  function taskMetaHtml(task, referenceDate) {
    var meta = [];
    var dueKind = taskDueKind(task, referenceDate);
    if (task.priority) {
      meta.push({ text: "Prioridad " + optionLabel(TASK_PRIORITIES, task.priority), cls: task.priority === "alta" ? "danger" : "" });
    }
    if (task.status) {
      meta.push({ text: optionLabel(TASK_STATUSES, task.status), cls: task.status === "bloqueada" ? "danger" : (task.status === "completada" ? "success" : "") });
    }
    if (task.dueDate) {
      var dueLabel = dueKind === "overdue" ? "Vencida" : (dueKind === "due-today" ? "Vence hoy" : (dueKind === "due-tomorrow" ? "Vence ma\u00f1ana" : "Vence"));
      meta.push({ text: dueLabel + " " + formatDateOnly(task.dueDate), cls: dueKind === "overdue" ? "danger" : (dueKind ? "warning" : "") });
    }
    if (task.scheduledDate) meta.push({ text: "Plan " + formatDateOnly(task.scheduledDate), cls: "" });
    if (task.taskType) meta.push({ text: optionLabel(TASK_TYPES, task.taskType), cls: "" });
    if (meta.length === 0) return "";
    return '<div class="task-meta">' + meta.map(function (item) {
      return '<span class="task-pill' + (item.cls ? ' ' + item.cls : '') + '">' + escapeHtml(item.text) + '</span>';
    }).join("") + '</div>';
  }

  function subtasksHtml(task, projectId) {
    var subtasks = normalizeSubtasks(task.subtasks);
    var projectAttr = projectId ? ' data-project-id="' + projectId + '"' : '';
    var html = '<div class="subtask-list">';
    subtasks.forEach(function (item) {
      html += '<div class="subtask-row' + (item.done ? ' done' : '') + '">' +
        '<button class="subtask-check" data-action="toggle-subtask" data-id="' + task.id + '" data-subtask-id="' + item.id + '"' + projectAttr + ' aria-label="' + (item.done ? 'Reabrir subtarea' : 'Completar subtarea') + '">' +
        (item.done ? iconCheck(10, "currentColor") : '') +
        '</button>' +
        '<span class="subtask-text">' + escapeHtml(item.text) + '</span>' +
        '<button class="subtask-delete" data-action="delete-subtask" data-id="' + task.id + '" data-subtask-id="' + item.id + '"' + projectAttr + ' aria-label="Eliminar subtarea">' + iconX(11) + '</button>' +
        '</div>';
    });
    html += '<div class="subtask-add">' +
      '<input class="subtask-add-input" type="text" placeholder="Agregar subtarea..." data-task-id="' + task.id + '"' + projectAttr + ' autocomplete="off">' +
      '<button data-action="add-subtask" data-id="' + task.id + '"' + projectAttr + '>Agregar</button>' +

  function taskNoteHtml(task, projectId) {
    var note = sanitizeText(task.notes || "", VALIDATION_LIMITS.taskNotesMax);
    if (!note) return "";
    var key = (projectId || state.activeProjectId || "project") + ":" + task.id;
    var expanded = !!state.expandedNotes[key];

  function projectChipHtml(project) {
    return '<span class="project-chip"><span class="dot" style="background:' + project.color + '"></span><span>' + escapeHtml(project.name) + '</span></span>';
  }

  function priorityRank(priority) {
    if (priority === "alta") return 0;
    if (priority === "media") return 1;
    return 2;
  }

  function todaySort(a, b) {
    var overdueA = a.task.dueDate && a.task.dueDate < state.todayDate && !isTaskCompleted(a.task) ? 0 : 1;
    var overdueB = b.task.dueDate && b.task.dueDate < state.todayDate && !isTaskCompleted(b.task) ? 0 : 1;
    if (overdueA !== overdueB) return overdueA - overdueB;
    var priorityDiff = priorityRank(a.task.priority) - priorityRank(b.task.priority);
    if (priorityDiff !== 0) return priorityDiff;
    var dateDiff = compareDateOnly(a.task.dueDate, b.task.dueDate);
    if (dateDiff !== 0) return dateDiff;
    return (a.task.position || 0) - (b.task.position || 0);
  }

  function collectGlobalTasks() {
    var rows = [];
    state.projects.forEach(function (project) {
      project.tasks.filter(function (task) { return !isTaskDeleted(task); }).forEach(function (task) {
        rows.push({ project: project, task: task });
      });
    });
    return rows;
  }

  function searchMatchesTask(task, query) {
    var haystack = [
      task.text || "",
      task.notes || "",
      optionLabel(TASK_STATUSES, task.status),
      optionLabel(TASK_PRIORITIES, task.priority),
      optionLabel(TASK_TYPES, task.taskType)
    ].concat(normalizeSubtasks(task.subtasks).map(function (item) { return item.text; })).join(" ").toLowerCase();
    return haystack.indexOf(query.toLowerCase()) !== -1;
  }

  function searchResults() {
    var query = sanitizeText(state.searchQuery || "", 120);
    if (!query) return [];
    return collectGlobalTasks().filter(function (row) {
      return searchMatchesTask(row.task, query);
    }).sort(function (a, b) {
      var projectDiff = a.project.name.localeCompare(b.project.name);
      if (projectDiff !== 0) return projectDiff;
      var laneDiff = normalizeLane(a.task.lane).localeCompare(normalizeLane(b.task.lane));
      if (laneDiff !== 0) return laneDiff;
      return (a.task.position || 0) - (b.task.position || 0);
    });
  }

  function classifyTodayTasks() {
    var selected = state.todayDate;
    var rows = collectGlobalTasks();
    var activeRows = rows.filter(function (row) { return !isTaskCompleted(row.task); });
    var completedToday = rows.filter(function (row) { return isTaskCompleted(row.task) && dateOnlyFromTimestamp(row.task.completedAt) === selected; });
    var sections = {
      overdue: activeRows.filter(function (row) { return row.task.dueDate && row.task.dueDate < selected; }),
      today: activeRows.filter(function (row) { return row.task.dueDate === selected || row.task.scheduledDate === selected; }),
      urgent: activeRows.filter(function (row) { return row.task.lane === "urgente" || row.task.priority === "alta"; }),
      blocked: activeRows.filter(function (row) { return row.task.status === "bloqueada"; }),
      upcoming: activeRows.filter(function (row) { return row.task.dueDate && row.task.dueDate > selected; })
    };
    Object.keys(sections).forEach(function (key) { sections[key].sort(todaySort); });

    var dailyIds = {};
    sections.today.forEach(function (row) { dailyIds[row.project.id + ":" + row.task.id] = true; });
    completedToday.forEach(function (row) { dailyIds[row.project.id + ":" + row.task.id] = true; });
    var dailyTotal = Object.keys(dailyIds).length;
    var dailyPct = dailyTotal ? Math.round((completedToday.length / dailyTotal) * 100) : 0;

    return {
      rows: rows,
      completedToday: completedToday,
      sections: sections,
      summary: {
        overdue: sections.overdue.length,
        today: sections.today.length,
        blocked: sections.blocked.length,
        completedToday: completedToday.length,
        dailyPct: dailyPct
      }
    };
  }

      main.innerHTML = '<div class="empty-state">Cre\u00e1 un proyecto para empezar.</div>';
      return;

    var visibleActiveTasks = active.tasks.filter(function (t) { return !isTaskDeleted(t); });
    var total = visibleActiveTasks.length;

    var pct = total ? Math.round((doneCount / total) * 100) : 0;

    var html = '<div class="project-header">' +
      '<div class="project-header-left">' +
      '<span class="project-dot" style="background:' + active.color + '"></span>';

      html += '<input type="text" class="project-title-input" id="projectNameInput" value="' + escapeHtml(active.name) + '">';
    } else {
      html += '<h1 class="project-title" data-action="edit-project-name" title="Click para renombrar">' + escapeHtml(active.name) + '</h1>';

    html += '</div>';
